# =============================================================================
# Project NEXUS - React Frontend Nginx Configuration (Blue/Green)
# =============================================================================

# =============================================================================
# Bot-only prerender serving.
#
# Real users always get the live SPA index.html — never a prerendered snapshot.
# This decouples snapshot freshness from user-facing correctness: a snapshot
# can reference stale build-hashed asset URLs without breaking page hydration,
# because the browser that loads those URLs is not the one that needs to
# execute the JS. Bots ignore JS entirely; they only read the body + meta.
#
# Side effect: the post-deploy stale-asset invalidation logic in
# prerender-tenants.sh is no longer load-bearing. Snapshots survive deploys
# and only need to be re-rendered when their content (DB-driven) changes.
# =============================================================================
map $http_user_agent $nexus_is_seo_bot {
    default 0;
    # Search-engine crawlers (organic SEO):
    #   googlebot, bingbot, slurp (Yahoo), duckduckbot, baiduspider, yandex,
    #   sogou, exabot, applebot, petalbot (Huawei), seznambot (Czech)
    # Social link unfurlers (Open Graph / Twitter cards / etc.):
    #   facebookexternalhit, twitterbot, linkedinbot, embedly, pinterest,
    #   slackbot, whatsapp, telegrambot, discordbot, redditbot, viberbot,
    #   skypeuripreview, vkshare
    # SEO audit / monitoring tools:
    #   ahrefsbot, semrushbot, mj12bot, chrome-lighthouse, screaming frog,
    #   dotbot, rogerbot, sitebulb
    # AI assistants / LLM training crawlers:
    #   gptbot (OpenAI), oai-searchbot (ChatGPT search), chatgpt-user,
    #   claudebot, claude-web, anthropic-ai, perplexitybot, perplexity-user,
    #   bytespider (ByteDance/TikTok), ccbot (Common Crawl), google-extended,
    #   amazonbot, applebot-extended, cohere-ai, diffbot, you.com, neevabot
    "~*(googlebot|bingbot|slurp|duckduckbot|baiduspider|yandex|sogou|exabot|applebot|petalbot|seznambot|facebookexternalhit|twitterbot|linkedinbot|embedly|pinterest|slackbot|whatsapp|telegrambot|discordbot|redditbot|viberbot|skypeuripreview|vkshare|ahrefsbot|semrushbot|mj12bot|chrome-lighthouse|screaming\\s*frog|dotbot|rogerbot|sitebulb|gptbot|oai-searchbot|chatgpt-user|claudebot|claude-web|anthropic-ai|perplexitybot|perplexity-user|bytespider|ccbot|google-extended|amazonbot|applebot-extended|cohere-ai|diffbot|you\\.com|neevabot)" 1;
}

# Composite key: "<bot>:<bypass>". The Playwright worker sets bypass=1 to
# render against the live SPA (else it would render a snapshot of a snapshot).
# Anything other than "1:" or "1:0" falls through to a guaranteed-missing path
# so try_files lands on /index.html.
map "$nexus_is_seo_bot:$arg_nexus_prerender_bypass" $nexus_prerender_page {
    default /__nexus_prerender_bypass__;
    "1:"  /prerendered/$host$uri/index.html;
    "1:0" /prerendered/$host$uri/index.html;
}

map "$nexus_is_seo_bot:$arg_nexus_prerender_bypass" $nexus_prerender_root {
    default /__nexus_prerender_bypass__;
    "1:"  /prerendered/$host/index.html;
    "1:0" /prerendered/$host/index.html;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com https://checkout.stripe.com https://api.openai.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; form-action 'self'; object-src 'none'; base-uri 'self';" always;

    # =========================================================================
    # Emergency SW kill-switch — /api/sw-reset.
    #
    # Last-resort manual recovery URL for users wedged on a broken service
    # worker. Bypasses every SW we've ever shipped because all of them
    # denylist /^\/api\// from the navigation handler — so the request
    # reaches nginx unconditionally. Response sends Clear-Site-Data and an
    # inline script that:
    #   1. Unregisters all service workers via navigator.serviceWorker
    #   2. Clears all CacheStorage entries (workbox precache lives here)
    #   3. Redirects to / — no SW intercepts the navigation now, so the
    #      browser fetches the fresh /index.html from the network.
    # Cookies + localStorage are preserved so the user stays logged in.
    #
    # Routine staleness should never reach this URL. The api.ts stale-client
    # gate redirects here automatically only after a 10-minute mismatch
    # window has elapsed without the soft-update path recovering the client.
    #
    # CSP is relaxed to allow the inline script ('unsafe-inline') — scoped
    # to this single recovery route only, not the rest of the site.
    # =========================================================================
    location = /api/sw-reset {
        default_type text/html;
        add_header Clear-Site-Data '"cache", "executionContexts"' always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        return 200 '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="3;url=/?nexus_recovered=meta"><title>Updating</title><style>body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#94a3b8;min-height:100vh;display:flex;align-items:center;justify-content:center}main{display:flex;align-items:center;gap:.6rem;font-size:.875rem;letter-spacing:.01em}.dot{width:8px;height:8px;border-radius:50%;background:#6366f1;animation:p 1.4s ease-in-out infinite}@keyframes p{0%,100%{opacity:.3;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}a{color:#475569;text-decoration:none;font-size:.75rem;margin-left:1rem;border-bottom:1px dotted #475569}a:hover{color:#94a3b8;border-bottom-color:#94a3b8}</style></head><body><main><span class="dot" aria-hidden="true"></span><span>Updating</span><a href="/">tap if stuck</a></main><script>(function(){var done=false;function go(){if(done)return;done=true;try{window.location.replace("/?nexus_recovered="+Date.now())}catch(e){window.location.href="/?nexus_recovered="+Date.now()}}setTimeout(go,2500);function tmo(ms){return new Promise(function(r){setTimeout(r,ms)})}function race(p,ms){return Promise.race([p,tmo(ms)])}function uw(){try{if(!("serviceWorker" in navigator))return Promise.resolve();return race(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){try{return r.unregister().catch(function(){})}catch(e){return Promise.resolve()}}))}).catch(function(){}),1500)}catch(e){return Promise.resolve()}}function cc(){try{if(!("caches" in window))return Promise.resolve();return race(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){try{return caches.delete(k).catch(function(){})}catch(e){return Promise.resolve()}}))}).catch(function(){}),1500)}catch(e){return Promise.resolve()}}uw().then(cc).then(go)})()</script></body></html>';
    }

    location ~* ^/(sw\.js|sw-rescue\.js|workbox-[^/]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        access_log off;
    }

    location ^~ /uploads/ {
        proxy_pass http://${NEXUS_API_UPSTREAM}:80;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        # try_files fallback in `location /` and `location = /` rewrites to
        # /index.html, which lands here for final processing. Without these
        # repeated headers, every user-facing HTML response from the SPA shell
        # would ship with zero security headers.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com https://checkout.stripe.com https://api.openai.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; form-action 'self'; object-src 'none'; base-uri 'self';" always;
    }

    location ~* ^/(build-info\.json|manifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location = /robots.txt {
        sub_filter 'app.project-nexus.ie' $host;
        sub_filter_types text/plain;
        sub_filter_once on;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~ ^/sitemap(-[a-zA-Z0-9_-]+)?\.xml$ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Sitemap-Host $host;
        proxy_pass https://api.project-nexus.ie;
    }

    # AI-readable site summary (llmstxt.org convention).
    # Same backend pattern as the sitemap — host-aware tenant resolution.
    location ~ ^/llms(-full)?\.txt$ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Sitemap-Host $host;
        proxy_pass https://api.project-nexus.ie;
        add_header X-Robots-Tag "noindex" always;
    }

    location ~* ^/(wp-login\.php|wp-admin|wp-includes|wp-json|xmlrpc\.php) {
        return 410;
    }

    location ~* ^/wp-content/ {
        return 410;
    }

    location = /wp-sitemap.xml {
        return 301 /sitemap.xml;
    }

    location ~* ^/guides/ {
        return 410;
    }

    location = /southern-star/ {
        return 410;
    }

    location = /southern-star {
        return 410;
    }

    location = /community-directory/ {
        return 301 /explore;
    }

    location = /community-directory {
        return 301 /explore;
    }

    # Old "/home/" duplicate of "/". Indexed by Google as a separate URL,
    # split link equity. 301 consolidates it.
    location = /home/ { return 301 /; }
    location = /home  { return 301 /; }

    # Test routes that leaked into the public index.
    location ~* ^/testing(/.*)?$    { return 410; }
    location ~* ^/login-test(/.*)?$ { return 410; }

    # Legacy WordPress URLs from the pre-React site that are still in
    # search-engine indexes. Only paths with NO equivalent React route are
    # listed here — paths like /social-prescribing, /members, /feed are
    # real React routes (gated, but real) and must fall through to the SPA.
    location ~* ^/membership/?$         { return 301 /about; }
    location ~* ^/sign-up/?$            { return 301 /register; }
    location ~* ^/social-impact-study/?$ { return 301 /blog; }
    location ~* ^/news/?$               { return 301 /blog; }
    location ~* ^/category/[^/]+/?$     { return 301 /blog; }
    location ~* ^/tag/[^/]+/?$          { return 301 /blog; }
    location = /comments/feed/          { return 410; }
    location ~* ^/\?p=[0-9]+$           { return 301 /blog; }

    # /pricing and /book-a-demo are linked from the project-nexus.ie sales site
    # but are not React routes on tenant frontends. Send tenant-domain hits to
    # a real page rather than letting them land on a blank SPA shell.
    location = /pricing      { return 301 /; }
    location = /pricing/     { return 301 /; }
    location = /book-a-demo  { return 301 /contact; }
    location = /book-a-demo/ { return 301 /contact; }

    location ~* ^/vendor/ {
        return 410;
    }

    location ~* ^/author/ {
        return 410;
    }

    location = / {
        try_files $nexus_prerender_root /index.html;
        # HTML is never cached at the CDN. Bots and users get different responses
        # at the same URL (snapshot vs SPA), so a per-URL CDN cache would poison
        # across user-agents. The PWA's NetworkFirst handles user-side freshness;
        # CF still caches all the immutable /assets/* bundles.
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Vary "User-Agent" always;
        # Re-declare the server-level security headers. nginx's add_header rule
        # is "no inheritance if defined locally" — once we set Cache-Control
        # here, every add_header at server level is dropped from the response.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com https://checkout.stripe.com https://api.openai.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; form-action 'self'; object-src 'none'; base-uri 'self';" always;
    }

    location / {
        try_files $uri $nexus_prerender_page /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Vary "User-Agent" always;
        # Same security-header re-declaration as `location = /`. See comment above.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com https://checkout.stripe.com https://api.openai.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; form-action 'self'; object-src 'none'; base-uri 'self';" always;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Allow /.well-known/* (security.txt per RFC 9116, plus future ACME
    # http-01 challenge files if we ever need them). Listed BEFORE the
    # dotfile-deny rule so it wins the longest-prefix-match.
    location ^~ /.well-known/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

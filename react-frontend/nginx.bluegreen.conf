# =============================================================================
# Project NEXUS - React Frontend Nginx Configuration (Blue/Green)
# =============================================================================

map $arg_nexus_prerender_bypass $nexus_prerender_page {
    default /prerendered/$host$uri/index.html;
    1 /__nexus_prerender_bypass__;
}

map $arg_nexus_prerender_bypass $nexus_prerender_root {
    default /prerendered/$host/index.html;
    1 /__nexus_prerender_bypass__;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com https://checkout.stripe.com https://api.openai.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; form-action 'self'; object-src 'none'; base-uri 'self';" always;

    # =========================================================================
    # Emergency cache/SW kill-switches — manual recovery URLs for users
    # trapped on a broken or wedged service worker.
    #
    # /api/sw-reset is the ONE that works for users currently stuck. The old
    # SW's navigateFallbackDenylist matches /^\/api\// so requests under /api/
    # bypass the SW and reach the network. The response includes an inline
    # script that:
    #   1. Unregisters all service workers via navigator.serviceWorker
    #   2. Clears all CacheStorage entries (workbox precache lives here)
    #   3. Redirects to / — by which point no SW intercepts the navigation,
    #      so the browser fetches the fresh /index.html from the network.
    # Cookies + localStorage are intentionally preserved so the user stays
    # logged in.
    #
    # /clear-site-data does the same thing for any future user whose SW
    # config DOES have it in the denylist (it's been added to vite.config.ts
    # for going-forward builds). Today it's a no-op for already-stuck users
    # because their SW intercepts and serves the precached SPA shell.
    #
    # CSP is relaxed to allow the inline script ('unsafe-inline') — scoped
    # to these two recovery routes only, not the rest of the site.
    # =========================================================================
    location ~ ^/(api/sw-reset|clear-site-data)$ {
        default_type text/html;
        add_header Clear-Site-Data '"cache", "executionContexts"' always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        return 200 '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="3;url=/?nexus_recovered=meta"><title>Resetting app cache</title><style>body{font-family:system-ui,-apple-system,sans-serif;padding:2rem;text-align:center;background:#0f172a;color:#e2e8f0;line-height:1.6;margin:0}h1{color:#6366f1;margin:0 0 1rem}p{margin:0.5rem 0}a{color:#6366f1}</style></head><body><h1>Resetting app cache</h1><p>This takes about 2 seconds&hellip;</p><p id="s">Working&hellip;</p><p style="margin-top:2rem;font-size:0.9em"><a href="/">Continue manually</a> if not redirected.</p><script>(function(){var s=document.getElementById("s");var done=false;function go(){if(done)return;done=true;try{window.location.replace("/?nexus_recovered="+Date.now())}catch(e){window.location.href="/?nexus_recovered="+Date.now()}}setTimeout(go,2500);function tmo(ms){return new Promise(function(r){setTimeout(r,ms)})}function race(p,ms){return Promise.race([p,tmo(ms)])}function uw(){try{if(!("serviceWorker" in navigator))return Promise.resolve();return race(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){try{return r.unregister().catch(function(){})}catch(e){return Promise.resolve()}}))}).catch(function(){}),1500)}catch(e){return Promise.resolve()}}function cc(){try{if(!("caches" in window))return Promise.resolve();return race(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){try{return caches.delete(k).catch(function(){})}catch(e){return Promise.resolve()}}))}).catch(function(){}),1500)}catch(e){return Promise.resolve()}}uw().then(function(){if(s)s.textContent="Clearing caches…";return cc()}).then(function(){if(s)s.textContent="Done. Redirecting…";go()})})()</script></body></html>';
    }

    location ~* ^/(sw\.js|sw-rescue\.js|workbox-[^/]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        access_log off;
    }

    location ^~ /uploads/ {
        proxy_pass http://${NEXUS_API_UPSTREAM}:80;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    location ~* ^/(build-info\.json|manifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location = /robots.txt {
        sub_filter 'app.project-nexus.ie' $host;
        sub_filter_types text/plain;
        sub_filter_once on;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~ ^/sitemap(-[a-zA-Z0-9_-]+)?\.xml$ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Sitemap-Host $host;
        proxy_pass https://api.project-nexus.ie;
    }

    location ~* ^/(wp-login\.php|wp-admin|wp-includes|wp-json|xmlrpc\.php) {
        return 410;
    }

    location ~* ^/wp-content/ {
        return 410;
    }

    location = /wp-sitemap.xml {
        return 301 /sitemap.xml;
    }

    location ~* ^/guides/ {
        return 410;
    }

    location = /southern-star/ {
        return 410;
    }

    location = /southern-star {
        return 410;
    }

    location = /community-directory/ {
        return 301 /explore;
    }

    location = /community-directory {
        return 301 /explore;
    }

    location ~* ^/vendor/ {
        return 410;
    }

    location ~* ^/author/ {
        return 410;
    }

    location = / {
        try_files $nexus_prerender_root /index.html;
        # Short browser cache, longer CDN cache. Cloudflare purge fires after every
        # deploy, so s-maxage is effectively bounded by deploy frequency.
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
    }

    location / {
        try_files $uri $nexus_prerender_page /index.html;
        # Short browser cache, longer CDN cache. Cloudflare purge fires after every
        # deploy, so s-maxage is effectively bounded by deploy frequency.
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

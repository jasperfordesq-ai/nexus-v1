# =============================================================================
# Project NEXUS - React Frontend Nginx Configuration
# =============================================================================
# Serves the built React SPA with proper routing and caching
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    # CSP notes:
    #  - 'unsafe-eval' removed from script-src. React prod bundles do not need
    #    eval(); keeping it open was a latent XSS amplifier.
    #  - 'unsafe-inline' retained on script-src only until we migrate to nonces
    #    (HeroUI/3rd-party integrations still inject inline bootstrap snippets).
    #  - connect-src: added https://checkout.stripe.com (Stripe Checkout hosted
    #    session) and https://api.openai.com (ChatGPT feature for /chat route)
    #    which were previously CSP-blocked.
    #  - form-action 'self' prevents exfil via hidden <form action="https://evil">
    #    submissions; forms are generated client-side so 'self' is correct.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com https://checkout.stripe.com https://api.openai.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; form-action 'self'; object-src 'none'; base-uri 'self';" always;

    # Service worker files must NEVER be cached.
    # sw.js and workbox-*.js are plain .js files and would otherwise get the
    # 1-year immutable rule below — which prevents the browser from ever fetching
    # a new version, breaking update detection on all browsers (especially mobile).
    # The SW spec also requires sw.js to be served with no-store/no-cache so the
    # browser always checks for a byte-change on each registration.update() call.
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        access_log off;
    }

    # Proxy user-uploaded files to the PHP app container (which holds the uploads volume).
    # ^~ prefix takes priority over regex location blocks so the static-asset
    # caching rule below never intercepts upload paths and returns a 404.
    location ^~ /uploads/ {
        proxy_pass http://nexus-php-app:80;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache the index.html (for updates to take effect)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # robots.txt — served from built frontend assets with dynamic Sitemap URL.
    # The static file references app.project-nexus.ie, but when served from a
    # custom domain (e.g., hour-timebank.ie), the Sitemap directive must match
    # the serving domain. sub_filter rewrites it on the fly.
    location = /robots.txt {
        sub_filter 'app.project-nexus.ie' $host;
        sub_filter_types text/plain;
        sub_filter_once on;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Sitemap — proxy to API backend (which generates the XML from the database)
    # This makes app.project-nexus.ie/sitemap.xml work, so Google Search Console
    # can find the sitemap on the same domain as the content URLs.
    location ~ ^/sitemap(-[a-zA-Z0-9_-]+)?\.xml$ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Sitemap-Host $host;
        proxy_pass https://api.project-nexus.ie;
    }

    # =========================================================================
    # WordPress Legacy URL Handling
    # =========================================================================
    # The site migrated from WordPress. Old URLs with backlinks must either
    # 301 redirect to their new equivalent (preserving link equity) or return
    # 410 Gone (telling Google to de-index). Without this, every old URL
    # returns 200 via the SPA catch-all, creating soft 404s that destroy SEO.
    # =========================================================================

    # Block WordPress infrastructure probes (security + SEO)
    location ~* ^/(wp-login\.php|wp-admin|wp-includes|wp-json|xmlrpc\.php) {
        return 410;
    }

    # Old WordPress content/upload paths — gone
    location ~* ^/wp-content/ {
        return 410;
    }

    # Old WordPress sitemap — redirect to the real one
    location = /wp-sitemap.xml {
        return 301 /sitemap.xml;
    }

    # Old WordPress /guides/ content — no equivalent, tell Google it's gone
    location ~* ^/guides/ {
        return 410;
    }

    # Old WordPress pages that have no new equivalent
    location = /southern-star/ {
        return 410;
    }
    location = /southern-star {
        return 410;
    }
    location = /community-directory/ {
        return 301 /explore;
    }
    location = /community-directory {
        return 301 /explore;
    }

    # Old WordPress /vendor/ paths — gone
    location ~* ^/vendor/ {
        return 410;
    }

    # Old WordPress /author/ paths — gone
    location ~* ^/author/ {
        return 410;
    }

    # =========================================================================
    # Page serving — per-tenant pre-rendered HTML + SPA fallback
    # =========================================================================
    # Pre-rendered HTML is generated per-tenant AFTER deploy (not at build
    # time) by scripts/prerender-tenants.sh. Files are written into the
    # running container at /usr/share/nginx/prerendered/{domain}/{route}/index.html.
    #
    # Strategy:
    #   1. Check for per-tenant pre-rendered file (by $host domain)
    #   2. Fall back to SPA shell (index.html) for all other requests
    #
    # Both users AND bots get the pre-rendered HTML when available.
    # React hydrates on top and takes over client-side routing.
    # =========================================================================

    location / {
        # Try: static asset → per-tenant pre-rendered page → SPA shell
        try_files $uri /prerendered/$host$uri/index.html /prerendered/$host/index.html /index.html;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# Project NEXUS - React Frontend Nginx Configuration
# =============================================================================
# Serves the built React SPA with proper routing and caching
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for Prerender.io proxy (Google DNS + Docker DNS)
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # =========================================================================
    # Prerender.io — Serve pre-rendered HTML to search/social bots
    # Normal users get the SPA as usual; bots get fully rendered pages
    # with correct meta tags, OG images, and structured data.
    # =========================================================================
    set $prerender 0;

    # Detect search engine and social media crawlers
    if ($http_user_agent ~* "googlebot|bingbot|yandex|baiduspider|facebookexternalhit|twitterbot|linkedinbot|slackbot|whatsapp|Discordbot|TelegramBot|Applebot|pinterestbot|embedly|redditbot|Screaming Frog|rogerbot|showyoubot|outbrain|quora link preview|vkShare|W3C_Validator") {
        set $prerender 1;
    }

    # Don't prerender static files or service workers
    if ($uri ~* "\.(js|css|xml|png|jpg|jpeg|gif|pdf|txt|ico|svg|woff|woff2|ttf|eot|json|webp|map|mp3|mp4|webm|zip)$") {
        set $prerender 0;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self';" always;

    # Service worker files must NEVER be cached.
    # sw.js and workbox-*.js are plain .js files and would otherwise get the
    # 1-year immutable rule below — which prevents the browser from ever fetching
    # a new version, breaking update detection on all browsers (especially mobile).
    # The SW spec also requires sw.js to be served with no-store/no-cache so the
    # browser always checks for a byte-change on each registration.update() call.
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        access_log off;
    }

    # Cache static assets aggressively (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache the index.html (for updates to take effect)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # robots.txt — served directly from the built frontend assets
    # Must be outside the SPA fallback so crawlers get the actual file
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Sitemap — proxy to API backend (which generates the XML from the database)
    # This makes app.project-nexus.ie/sitemap.xml work, so Google Search Console
    # can find the sitemap on the same domain as the content URLs.
    location ~ ^/sitemap(-[a-zA-Z0-9_-]+)?\.xml$ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Sitemap-Host $host;
        proxy_pass https://api.project-nexus.ie;
    }

    # SPA routing — serve static files directly, everything else through @prerender
    location / {
        try_files $uri $uri/ @prerender;
    }

    # Prerender.io proxy for bots, SPA fallback for normal users
    location @prerender {
        # Prerender token must be at location level (not inside if)
        proxy_set_header X-Prerender-Token IXb37NUbV39Zq6OKT9s6;
        proxy_ssl_server_name on;

        # Bot request → proxy to Prerender.io for fully rendered HTML
        if ($prerender = 1) {
            rewrite .* /https://$host$request_uri? break;
            proxy_pass https://service.prerender.io;
        }

        # Normal user → serve SPA shell (index.html)
        rewrite .* /index.html break;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

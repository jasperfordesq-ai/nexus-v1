# =============================================================================
# Project NEXUS - React Frontend Nginx Configuration
# =============================================================================
# Serves the built React SPA with proper routing and caching
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://js.pusher.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

    # Service worker files must NEVER be cached.
    # sw.js and workbox-*.js are plain .js files and would otherwise get the
    # 1-year immutable rule below — which prevents the browser from ever fetching
    # a new version, breaking update detection on all browsers (especially mobile).
    # The SW spec also requires sw.js to be served with no-store/no-cache so the
    # browser always checks for a byte-change on each registration.update() call.
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        access_log off;
    }

    # Cache static assets aggressively (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache the index.html (for updates to take effect)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # SPA routing - serve index.html for all routes
    # The add_header directives ensure the HTML shell is never cached,
    # so after deploys users always get fresh chunk references.
    location / {
        try_files $uri $uri/ /index.html;

        # For HTML responses (SPA fallback), prevent caching
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

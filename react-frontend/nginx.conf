# =============================================================================
# Project NEXUS - React Frontend Nginx Configuration
# =============================================================================
# Serves the built React SPA with proper routing and caching
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for Prerender.io proxy (Google DNS + Docker DNS)
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # =========================================================================
    # Prerender.io — Serve pre-rendered HTML to search/social bots
    # Normal users get the SPA as usual; bots get fully rendered pages
    # with correct meta tags, OG images, and structured data.
    # =========================================================================
    set $prerender 0;

    # Detect search engine and social media crawlers
    if ($http_user_agent ~* "googlebot|bingbot|yandex|baiduspider|facebookexternalhit|twitterbot|linkedinbot|slackbot|whatsapp|Discordbot|TelegramBot|Applebot|pinterestbot|embedly|redditbot|Screaming Frog|rogerbot|showyoubot|outbrain|quora link preview|vkShare|W3C_Validator") {
        set $prerender 1;
    }

    # Don't prerender static files or service workers
    if ($uri ~* "\.(js|css|xml|png|jpg|jpeg|gif|pdf|txt|ico|svg|woff|woff2|ttf|eot|json|webp|map|mp3|mp4|webm|zip)$") {
        set $prerender 0;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://js.pusher.com https://analytics.ahrefs.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com https://*.tile.openstreetmap.org https://api.project-nexus.ie https://*.giphy.com https://giphy.com https://*.stripe.com; connect-src 'self' https://api.project-nexus.ie https://*.pusher.com wss://*.pusher.com https://*.googleapis.com https://*.gstatic.com https://*.google.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://api.giphy.com https://*.ingest.de.sentry.io https://analytics.ahrefs.com https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self';" always;

    # Service worker files must NEVER be cached.
    # sw.js and workbox-*.js are plain .js files and would otherwise get the
    # 1-year immutable rule below — which prevents the browser from ever fetching
    # a new version, breaking update detection on all browsers (especially mobile).
    # The SW spec also requires sw.js to be served with no-store/no-cache so the
    # browser always checks for a byte-change on each registration.update() call.
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        access_log off;
    }

    # Cache static assets aggressively (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache the index.html (for updates to take effect)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # robots.txt — served from built frontend assets with dynamic Sitemap URL.
    # The static file references app.project-nexus.ie, but when served from a
    # custom domain (e.g., hour-timebank.ie), the Sitemap directive must match
    # the serving domain. sub_filter rewrites it on the fly.
    location = /robots.txt {
        sub_filter 'app.project-nexus.ie' $host;
        sub_filter_types text/plain;
        sub_filter_once on;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Sitemap — proxy to API backend (which generates the XML from the database)
    # This makes app.project-nexus.ie/sitemap.xml work, so Google Search Console
    # can find the sitemap on the same domain as the content URLs.
    location ~ ^/sitemap(-[a-zA-Z0-9_-]+)?\.xml$ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.project-nexus.ie;
        proxy_set_header X-Sitemap-Host $host;
        proxy_pass https://api.project-nexus.ie;
    }

    # =========================================================================
    # WordPress Legacy URL Handling
    # =========================================================================
    # The site migrated from WordPress. Old URLs with backlinks must either
    # 301 redirect to their new equivalent (preserving link equity) or return
    # 410 Gone (telling Google to de-index). Without this, every old URL
    # returns 200 via the SPA catch-all, creating soft 404s that destroy SEO.
    # =========================================================================

    # Block WordPress infrastructure probes (security + SEO)
    location ~* ^/(wp-login\.php|wp-admin|wp-includes|wp-json|xmlrpc\.php) {
        return 410;
    }

    # Old WordPress content/upload paths — gone
    location ~* ^/wp-content/ {
        return 410;
    }

    # Old WordPress sitemap — redirect to the real one
    location = /wp-sitemap.xml {
        return 301 /sitemap.xml;
    }

    # Old WordPress feed — redirect to blog
    location = /feed/ {
        return 301 /blog;
    }
    location = /feed {
        return 301 /blog;
    }

    # Old WordPress /guides/ content — no equivalent, tell Google it's gone
    location ~* ^/guides/ {
        return 410;
    }

    # Old WordPress pages that have no new equivalent
    location = /southern-star/ {
        return 410;
    }
    location = /southern-star {
        return 410;
    }
    location = /community-directory/ {
        return 301 /explore;
    }
    location = /community-directory {
        return 301 /explore;
    }

    # Old WordPress /vendor/ paths — gone
    location ~* ^/vendor/ {
        return 410;
    }

    # Old WordPress ?p=NNN post ID format — redirect to homepage
    # (nginx can't match query strings in location blocks, handle in @prerender)

    # Old WordPress /author/ paths — gone
    location ~* ^/author/ {
        return 410;
    }

    # =========================================================================
    # SPA routing
    # =========================================================================

    # =========================================================================
    # Page serving strategy (3 tiers)
    # =========================================================================
    # 1. Pre-rendered HTML: Public pages built at deploy time with Playwright.
    #    These exist as /about/index.html, /blog/index.html, etc. in dist/.
    #    Served to ALL visitors (users AND bots) — fastest possible TTFB.
    #    React hydrates on top and takes over client-side routing.
    #
    # 2. Prerender.io proxy: Dynamic public pages (blog/:slug, listings/:id,
    #    groups/:id) that can't be pre-rendered at build time. Bot requests
    #    are proxied to Prerender.io for rendered HTML. This is the fallback
    #    for pages not covered by tier 1.
    #
    # 3. SPA shell: Protected routes (dashboard, messages, wallet, etc.) and
    #    any route not matched above. Serves _spa.html (the original Vite
    #    index.html without pre-rendered content). React renders client-side.
    # =========================================================================

    # Tier 1 + 2 + 3: Try pre-rendered file first, then Prerender.io/SPA fallback
    location / {
        # Try: exact file → pre-rendered directory index → fallback
        try_files $uri $uri/index.html @prerender;
    }

    # Tier 2 (bots) + Tier 3 (everyone else)
    location @prerender {
        # Prerender.io proxy for bots on dynamic routes
        proxy_set_header X-Prerender-Token IXb37NUbV39Zq6OKT9s6;
        proxy_ssl_server_name on;

        # Bot request → proxy to Prerender.io for fully rendered HTML
        if ($prerender = 1) {
            rewrite .* /https://$host$request_uri? break;
            proxy_pass https://service.prerender.io;
        }

        # Normal user → serve SPA shell (_spa.html is the original Vite output)
        # Falls back to index.html if _spa.html doesn't exist (pre-Option C builds)
        rewrite .* /_spa.html break;
    }

    # Fallback: if _spa.html doesn't exist yet (builds before pre-rendering was added)
    location = /_spa.html {
        try_files /_spa.html /index.html =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

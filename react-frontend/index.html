<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: Android Chrome resizes the layout
         viewport (and 100dvh) when the soft keyboard opens, so fixed-bottom
         composers and sheets stay visible above it instead of being overlaid.
         iOS Safari ignores the property; useVisualViewport keeps compensating
         there (its offset self-corrects to ~0 wherever the layout resizes). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/api/v2/pwa/manifest?path=%2F" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NEXUS" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Default OG image — overridden per-page by PageMeta via react-helmet-async -->
    <meta property="og:image" content="/og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <title>NEXUS — Community Timebanking Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

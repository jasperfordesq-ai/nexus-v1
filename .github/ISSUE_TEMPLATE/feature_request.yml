name: Feature request
description: Suggest a new feature or an improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For open-ended ideas or questions, consider starting a [Discussion](https://github.com/jasperfordesq-ai/nexus-v1/discussions) first.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing [issues](https://github.com/jasperfordesq-ai/nexus-v1/issues) and [discussions](https://github.com/jasperfordesq-ai/nexus-v1/discussions) and this has not been proposed.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need or pain point. Focus on the problem, not just the solution.
      placeholder: As a community organiser, I struggle to ... because ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Which area does this affect?
      options:
        - Wallet / time credits / exchanges
        - Listings / marketplace
        - Messaging
        - Events
        - Groups
        - Social feed
        - Gamification
        - Volunteering
        - Federation
        - Search
        - Admin
        - Accessible frontend
        - Mobile
        - Other / cross-cutting
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is better.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, examples from other platforms, or anything else that helps.

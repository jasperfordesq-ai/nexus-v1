name: Bug report
description: Report something that is broken or behaving incorrectly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the fields below so we can reproduce and fix the problem.

        ⚠️ **Do not report security vulnerabilities here.** Use the private process in [SECURITY.md](https://github.com/jasperfordesq-ai/nexus-v1/blob/main/SECURITY.md) instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing [issues](https://github.com/jasperfordesq-ai/nexus-v1/issues) and [discussions](https://github.com/jasperfordesq-ai/nexus-v1/discussions) and this has not been reported.
          required: true
        - label: This is a bug, not a security vulnerability (those go through SECURITY.md).
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
      placeholder: When I do X, Y happens, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The smallest sequence of steps that triggers the problem.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where does it happen?
      options:
        - React frontend (app)
        - Accessible frontend
        - PHP API / backend
        - Mobile app
        - Admin
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which setup are you running?
      options:
        - Production (project-nexus.ie)
        - Local — Docker setup
        - Local — native (Laragon/Vite) setup
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The platform version (see the footer, the /features page, or the VERSION file).
      placeholder: "1.5.4"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any errors, console output, or screenshots. **Remove secrets, tokens, and personal data first.**
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — browser, OS, frequency, recent changes.

version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      php-production:
        dependency-type: production
      php-development:
        dependency-type: development

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      root-npm:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /react-frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react-frontend:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      mobile:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

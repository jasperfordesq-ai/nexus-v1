version: 2

# Quiet mode: routine PRs are restricted to PATCH and MINOR updates only.
# Major-version bumps are intentionally excluded — they require dedicated
# upgrade projects (React 19, PHP 8.5, TypeScript 6, etc.) and should never
# arrive as routine maintenance PRs.
#
# Security updates use GitHub's separate security-update flow and are NOT
# affected by these filters.
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      composer-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "06:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      root-npm-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /react-frontend
    schedule:
      interval: monthly
      time: "06:30"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      react-frontend-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: monthly
      time: "06:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      e2e-npm-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
      time: "07:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      root-docker-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /react-frontend
    schedule:
      interval: monthly
      time: "07:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      react-frontend-docker-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /sales-site
    schedule:
      interval: monthly
      time: "07:30"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      sales-site-docker-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "07:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      github-actions-routine:
        update-types:
          - patch
          - minor
        patterns:
          - "*"

version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /react-frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /react-frontend
    schedule:
      interval: weekly
      day: tuesday
      time: "06:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /sales-site
    schedule:
      interval: weekly
      day: tuesday
      time: "06:30"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "06:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

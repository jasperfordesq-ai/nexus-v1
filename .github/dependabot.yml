version: 2

# Quiet mode: keep dependency visibility without letting Dependabot flood the repo.
# Security update PRs use GitHub's separate security-update limit; this file
# controls routine version-update PRs only.
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      composer-routine:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "06:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      root-npm-routine:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /react-frontend
    schedule:
      interval: monthly
      time: "06:30"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      react-frontend-routine:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: monthly
      time: "06:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      e2e-npm-routine:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
      time: "07:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      root-docker-routine:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /react-frontend
    schedule:
      interval: monthly
      time: "07:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      react-frontend-docker-routine:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /sales-site
    schedule:
      interval: monthly
      time: "07:30"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      sales-site-docker-routine:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "07:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 1
    groups:
      github-actions-routine:
        patterns:
          - "*"

name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      project:
        description: 'Test project to run'
        required: false
        default: 'chromium-modern'
        type: choice
        options:
          - chromium-modern
          - firefox-modern
          - mobile-chrome
          - mobile-safari
          - admin
          - unauthenticated
          - all

env:
  E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
  E2E_TENANT: ${{ secrets.E2E_TENANT || 'hour-timebank' }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
  E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [chromium-modern, unauthenticated, admin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          PROJECT=${{ matrix.project }}
          if [ "${{ github.event.inputs.project }}" != "" ] && [ "${{ github.event.inputs.project }}" != "all" ]; then
            PROJECT="${{ github.event.inputs.project }}"
          fi
          # PR checks must not depend on live production tenant state. Run this
          # workflow only when a target E2E environment is configured explicitly;
          # the local Docker smoke job remains the blocking PR environment gate.
          # IMPORTANT: when a target environment / credentials are not configured
          # this job exits 0 (green) WITHOUT running any tests. To avoid a false
          # sense of safety, that state is surfaced as a loud ::warning:: and a job
          # summary — a green check here does NOT mean the E2E suite passed unless
          # the summary confirms tests actually ran. (Stays non-blocking by design;
          # the real gate is a self-contained run — see the E2E coverage notes.)
          if [ -z "$E2E_BASE_URL" ]; then
            echo "::warning::E2E NOT RUN (${PROJECT}) — E2E_BASE_URL is not configured. This check is GREEN but executed ZERO tests and is NOT a safety gate."
            { echo "### ⚠️ E2E tests did NOT run (${PROJECT})"; echo "No \`E2E_BASE_URL\` configured — this green check executed **zero** tests and is **not** a real gate."; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Skip credential-dependent projects when secrets are not configured.
          # Without credentials, authenticated suites time out on login and
          # exhaust the 30-minute job timeout. Public unauthenticated checks
          # can still run without secrets.
          if [ "$PROJECT" != "unauthenticated" ] && [ "$PROJECT" != "admin" ] && [ -z "$E2E_USER_EMAIL" ]; then
            echo "::warning::E2E NOT RUN (${PROJECT}) — E2E_USER_EMAIL not configured. Green but executed ZERO authenticated tests; not a gate."
            { echo "### ⚠️ Authenticated E2E did NOT run (${PROJECT})"; echo "No \`E2E_USER_EMAIL\` configured — zero authenticated tests ran."; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "$PROJECT" = "admin" ] && [ -z "$E2E_ADMIN_EMAIL" ]; then
            echo "::warning::E2E NOT RUN (admin) — E2E_ADMIN_EMAIL not configured. Green but executed ZERO admin tests; not a gate."
            { echo "### ⚠️ Admin E2E did NOT run"; echo "No \`E2E_ADMIN_EMAIL\` configured — zero admin tests ran."; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          npx playwright test --project=$PROJECT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            e2e/reports/
            e2e/test-results/
          retention-days: 30
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.project }}
          path: e2e/screenshots/
          retention-days: 7

  e2e-cross-browser:
    name: Cross-Browser E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        project: [firefox-modern, mobile-chrome, mobile-safari]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: |
          if [ -z "$E2E_BASE_URL" ]; then
            echo "::warning::E2E NOT RUN (${{ matrix.project }}) — E2E_BASE_URL not configured. Green but executed ZERO tests; not a gate."
            { echo "### ⚠️ Cross-browser E2E did NOT run (${{ matrix.project }})"; echo "No \`E2E_BASE_URL\` configured — zero tests ran."; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -z "$E2E_USER_EMAIL" ]; then
            echo "::warning::E2E NOT RUN (${{ matrix.project }}) — E2E_USER_EMAIL not configured. Green but executed ZERO tests; not a gate."
            { echo "### ⚠️ Cross-browser E2E did NOT run (${{ matrix.project }})"; echo "No \`E2E_USER_EMAIL\` configured — zero tests ran."; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          npx playwright test --project=${{ matrix.project }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            e2e/reports/
            e2e/test-results/
          retention-days: 30

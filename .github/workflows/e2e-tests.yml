name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      project:
        description: 'Test project to run'
        required: false
        default: 'chromium-modern'
        type: choice
        options:
          - chromium-modern
          - firefox-modern
          - mobile-chrome
          - mobile-safari
          - admin
          - unauthenticated
          - all

env:
  E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
  E2E_TENANT: ${{ secrets.E2E_TENANT || 'hour-timebank' }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
  E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

# This workflow only reads repository contents and uploads test artifacts.
# Keep the default GITHUB_TOKEN read-only for every job.
permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes during a fix session
# don't stack full E2E matrices in the runner queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# A green check on this workflow must MEAN something. Previously, when no E2E
# environment was configured, the test jobs exited 0 (GREEN) having run ZERO
# tests — a false sense of safety. That is fixed here:
#
#   * No E2E environment configured  -> jobs are SKIPPED (neutral grey), NOT a
#     passing green check. A skipped job does not assert success. This also keeps
#     `main` green (skipped != failed) and works for fork PRs (no secrets).
#   * E2E environment IS configured  -> the job runs for real. If it executes
#     ZERO tests, or required credentials are missing, it FAILS loudly. We never
#     pass `--pass-with-no-tests`, so Playwright exits non-zero when nothing ran.
#
# The blocking PR environment gate remains the self-contained local Docker smoke
# job (see e2e-smoke). This workflow is the *remote-environment* suite.
#
# NOTE: if you want unauthenticated-only E2E against a remote environment, set
# only `E2E_BASE_URL` and trim the matrices below to `[unauthenticated]`. Leaving
# a credentialed project in the matrix without its credentials is treated as a
# real misconfiguration and fails — by design, so partial setups are visible.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # Secrets cannot be referenced in a job-level `if:`, so resolve "is an E2E
  # environment configured?" here and expose it as a job output the test jobs gate on.
  e2e-preflight:
    name: E2E Preflight (environment check)
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        name: Determine whether an E2E target is configured
        run: |
          if [ -n "$E2E_BASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "E2E_BASE_URL is configured — remote E2E jobs will run."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E skipped::No E2E_BASE_URL configured. The remote E2E jobs are SKIPPED (reported as skipped/neutral, NOT as a passing green check). The blocking PR gate is the self-contained local Docker smoke job."
            { echo "### ⏭️ Remote E2E skipped"; echo "No \`E2E_BASE_URL\` configured — the remote E2E jobs were **skipped** (not run, not a green pass). A green pass on this workflow only ever means tests actually ran."; } >> "$GITHUB_STEP_SUMMARY"
          fi

  e2e-tests:
    name: E2E Tests
    needs: e2e-preflight
    if: needs.e2e-preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [chromium-modern, unauthenticated, admin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          PROJECT=${{ matrix.project }}
          if [ "${{ github.event.inputs.project }}" != "" ] && [ "${{ github.event.inputs.project }}" != "all" ]; then
            PROJECT="${{ github.event.inputs.project }}"
          fi
          # We are inside a CONFIGURED run (E2E_BASE_URL is set). Missing credentials
          # for a credentialed project is a real misconfiguration -> FAIL loudly
          # rather than silently exit green having run nothing.
          if [ "$PROJECT" != "unauthenticated" ] && [ "$PROJECT" != "admin" ] && [ -z "$E2E_USER_EMAIL" ]; then
            echo "::error title=E2E misconfigured::E2E_BASE_URL is set but E2E_USER_EMAIL is missing — authenticated project '$PROJECT' cannot run. Configure the credentials or scope the matrix to [unauthenticated]."
            exit 1
          fi
          if [ "$PROJECT" = "admin" ] && [ -z "$E2E_ADMIN_EMAIL" ]; then
            echo "::error title=E2E misconfigured::E2E_BASE_URL is set but E2E_ADMIN_EMAIL is missing — admin project cannot run."
            exit 1
          fi
          # Do NOT add --pass-with-no-tests: Playwright exits non-zero ("no tests
          # found") so a run that matches ZERO tests FAILS instead of green-passing.
          npx playwright test --project=$PROJECT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            e2e/reports/
            e2e/test-results/
          retention-days: 30
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.project }}
          path: e2e/screenshots/
          retention-days: 7

  e2e-cross-browser:
    name: Cross-Browser E2E Tests
    needs: e2e-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.e2e-preflight.outputs.configured == 'true'

    strategy:
      fail-fast: false
      matrix:
        project: [firefox-modern, mobile-chrome, mobile-safari]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: |
          # Inside a CONFIGURED run. Cross-browser projects exercise authenticated
          # flows; missing credentials is a real misconfiguration -> FAIL loudly.
          if [ -z "$E2E_USER_EMAIL" ]; then
            echo "::error title=E2E misconfigured::E2E_BASE_URL is set but E2E_USER_EMAIL is missing — cross-browser project ${{ matrix.project }} cannot run."
            exit 1
          fi
          # No --pass-with-no-tests: a zero-test run FAILS instead of green-passing.
          npx playwright test --project=${{ matrix.project }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            e2e/reports/
            e2e/test-results/
          retention-days: 30

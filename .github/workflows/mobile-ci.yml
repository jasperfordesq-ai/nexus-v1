# mobile-ci.yml — PR / push CI for the React Native mobile app.
# This is the REQUIRED check that must pass before merging PRs that touch mobile/.
# Runs: TypeScript type-check → ESLint → Jest (with coverage summary).

name: Mobile CI

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
  pull_request:
    branches:
      - main
    paths:
      - "mobile/**"

# Cancel in-progress runs on the same branch/PR to avoid redundant work.
concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-ci:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Run all `run` steps from the mobile/ subdirectory by default.
    defaults:
      run:
        working-directory: mobile

    # Env vars consumed by Expo public config during the CI run.
    env:
      EXPO_PUBLIC_API_URL: https://api.project-nexus.ie
      EXPO_PUBLIC_DEFAULT_TENANT: hour-timebank

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history lets tools like semantic-release or changeset work
          # correctly if added later; costs nothing on shallow-clone runners.
          fetch-depth: 0

      # ── 2. Node.js setup with npm cache ──────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # Cache key is derived from mobile/package-lock.json so the cache is
          # invalidated whenever dependencies change.
          cache-dependency-path: "mobile/package-lock.json"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies (npm ci)
        # npm ci is deterministic: uses package-lock.json, never updates it.
        run: npm ci

      # ── 4. TypeScript type-check ──────────────────────────────────────────────
      - name: TypeScript type-check (tsc --noEmit)
        # Runs tsc --noEmit as defined in the "type-check" script.
        # Fails fast on any type error — no emit so nothing touches dist/.
        run: npm run type-check

      # ── 5. ESLint ─────────────────────────────────────────────────────────────
      - name: Lint (expo lint / ESLint)
        # Uses the Expo-managed ESLint config; exits non-zero on any error.
        run: npm run lint

      # ── 6. Jest tests with coverage ──────────────────────────────────────────
      - name: Run tests with coverage
        # --ci          : fail on snapshots that need updating; no interactive prompts
        # --coverage    : collect Istanbul coverage data
        # --coverageReporters=text-summary : concise summary in CI log + JSON/lcov
        #                 for the artifact upload below
        run: npm test -- --ci --coverage --coverageReporters=text-summary --coverageReporters=lcov

      # ── 7. Upload coverage report as artifact ────────────────────────────────
      - name: Upload coverage report
        # Always upload even when tests fail so coverage data is available for
        # debugging; the job still fails from the previous step.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage-report
          # Jest writes lcov output to coverage/ by default.
          path: mobile/coverage/
          # Keep for 7 days — enough for PR review without eating quota.
          retention-days: 7

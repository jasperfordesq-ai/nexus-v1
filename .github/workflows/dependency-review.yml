name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'react-frontend/package.json'
      - 'react-frontend/package-lock.json'
      - 'sales-site/package.json'
      - 'sales-site/package-lock.json'
      - 'composer.json'
      - 'composer.lock'

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        # Non-blocking: action requires GitHub's Dependency Graph feature
        # which is currently not enabled on this repo. Re-tighten by
        # removing continue-on-error after enabling Dependency Graph at
        # https://github.com/jasperfordesq-ai/nexus-v1/settings/security_analysis
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

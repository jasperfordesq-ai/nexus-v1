#
# mobile-type-check.yml — Lightweight TypeScript check for fast PR feedback.
#
# This workflow runs ONLY tsc --noEmit so developers get a type-error signal
# within ~2 minutes of opening a PR, well before the full mobile-ci job
# (which also runs lint + Jest) completes.
#
# It does NOT replace mobile-ci — both should be required checks.

name: Mobile Type-check (fast)

on:
  pull_request:
    branches:
      - main
    paths:
      - "mobile/**"

# Cancel in-progress runs on the same PR to avoid stacking checks.
concurrency:
  group: mobile-type-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: mobile

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Shallow clone is fine here — we only need source files, not history.
          fetch-depth: 1

      # ── 2. Node.js setup with npm cache ──────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "mobile/package-lock.json"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies (npm ci)
        # Full npm ci is needed so TypeScript can resolve all @types/* packages
        # and module declarations from node_modules.
        run: npm ci

      # ── 4. TypeScript type-check ──────────────────────────────────────────────
      - name: TypeScript type-check (tsc --noEmit)
        # Delegates to the "type-check" npm script which runs `tsc --noEmit`.
        # Strict mode is enforced via tsconfig.json in the mobile/ directory.
        # The step exits non-zero on any type error, blocking the PR.
        run: npm run type-check

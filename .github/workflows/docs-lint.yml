name: Docs Lint

# Quality gates for documentation: Markdown structure and publication hygiene,
# Laravel/OpenAPI parity, deterministic OpenAPI linting, companion-contract
# alignment, and a strict MkDocs build.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-public/**'
      - 'accessible-frontend/*.md'
      - 'mobile/**/*.md'
      - 'e2e/**/*.md'
      - 'tests/**/*.md'
      - '*.md'
      - 'openapi.json'
      - 'resources/openapi.json'
      - 'resources/openapi.yaml'
      - 'routes/api.php'
      - 'mkdocs.yml'
      - '.markdownlint-cli2.jsonc'
      - 'redocly.yaml'
      - 'scripts/check-docs-hygiene.mjs'
      - 'scripts/check-openapi-route-contract.mjs'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'docs-public/**'
      - 'accessible-frontend/*.md'
      - 'mobile/**/*.md'
      - 'e2e/**/*.md'
      - 'tests/**/*.md'
      - '*.md'
      - 'openapi.json'
      - 'resources/openapi.json'
      - 'resources/openapi.yaml'
      - 'routes/api.php'
      - 'mkdocs.yml'
      - '.markdownlint-cli2.jsonc'
      - 'redocly.yaml'
      - 'scripts/check-docs-hygiene.mjs'
      - 'scripts/check-openapi-route-contract.mjs'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

# Cancel superseded docs-lint runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: Markdown structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2@0.23.0
      - name: Documentation publication and navigation hygiene
        run: npm run check:docs

  openapi-lint:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Security-sensitive Laravel route/OpenAPI parity
        run: node scripts/check-openapi-route-contract.mjs
      - name: Redocly lint (pinned, maintained ruleset)
        run: npx --yes @redocly/cli@2.39.0 lint openapi.json resources/openapi.json resources/openapi.yaml --max-problems 1000
      - name: Focused resource JSON/YAML contracts stay aligned
        shell: bash
        run: |
          BUNDLED="$RUNNER_TEMP/resources-openapi-from-yaml.json"
          npx --yes @redocly/cli@2.39.0 bundle resources/openapi.yaml --ext json --output "$BUNDLED"
          node - "$BUNDLED" <<'NODE'
          const fs = require('node:fs');
          const canonicalize = (value) => value && typeof value === 'object'
            ? (Array.isArray(value)
              ? value.map(canonicalize)
              : Object.fromEntries(Object.keys(value).sort().map((key) => [key, canonicalize(value[key])])))
            : value;
          const jsonContract = JSON.parse(fs.readFileSync('resources/openapi.json', 'utf8'));
          const yamlContract = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          if (JSON.stringify(canonicalize(jsonContract)) !== JSON.stringify(canonicalize(yamlContract))) {
            console.error('resources/openapi.json and resources/openapi.yaml have drifted.');
            process.exit(1);
          }
          console.log('Focused resource OpenAPI JSON/YAML contracts are aligned.');
          NODE

  docs-build:
    name: MkDocs site builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install MkDocs Material
        run: pip install "mkdocs==1.6.1" "mkdocs-material==9.7.6" "pymdown-extensions==11.0.1"
      - name: Stage the OpenAPI contract for the API reference page
        run: cp openapi.json docs/openapi.json
      # check:docs in the Markdown job validates repo-root links and complete
      # nav coverage before MkDocs performs its strict site-only validation.
      - name: Build site
        run: mkdocs build --clean --strict

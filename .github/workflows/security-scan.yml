name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer Audit
        run: composer audit --locked --no-interaction

      # ── Trivy filesystem scan ─────────────────────────────────────
      # The TABLE step is the blocking gate (exit-code 1) because Trivy
      # correctly handles .trivyignore suppressions in table format.
      # The SARIF step is non-blocking (exit-code 0) and uploads results
      # to the GitHub Security tab for visibility.
      - name: Run Trivy Vulnerability Scanner (Table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          trivyignores: '.trivyignore'
          exit-code: '1'

      - name: Run Trivy Vulnerability Scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
          trivyignores: '.trivyignore'
          exit-code: '0'

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      # ── Semgrep SAST scan ─────────────────────────────────────────
      # Scans PHP source for injection, secrets, and security issues.
      # Uses .semgrepignore to exclude legacy/dead code paths.
      # Findings are uploaded to GitHub Security tab via SARIF.
      - name: Install Semgrep
        run: pip install semgrep

      - name: SAST Scan with Semgrep
        run: |
          semgrep ci \
            --config p/php \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep-results.sarif \
            || true
          # Semgrep may fail to produce the SARIF file (auth error, network issue,
          # install problem). Create a valid empty SARIF so the upload step
          # never crashes regardless of why Semgrep didn't write the file.
          if [ ! -f semgrep-results.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[]}' > semgrep-results.sarif
          fi
        env:
          SEMGREP_RULES: p/php p/security-audit p/secrets

      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'semgrep-results.sarif'
        if: always()

      # ── TruffleHog secret detection ──────────────────────────────
      # Blocks if verified secrets are found in the repository.
      - name: Check for Hardcoded Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      # ── PHP dependency vulnerability check ───────────────────────
      # Blocks if any known vulnerabilities exist in composer.lock.
      - name: PHP Security Checker
        run: |
          composer require --dev enlightn/security-checker
          vendor/bin/security-checker security:check composer.lock

      # ── OWASP Dependency Check ───────────────────────────────────
      # Blocks on CRITICAL and HIGH findings (CVSS >= 7).
      # Medium and low findings are reported but do not fail the build.
      # node_modules must exist for the NPM audit analyzer to function.
      # OSS Index requires credentials not available in CI — disabled.
      - name: Install Node Dependencies (for OWASP NPM audit)
        run: |
          npm ci --ignore-scripts
          cd react-frontend && npm ci --ignore-scripts
          cd ../e2e && npm ci --ignore-scripts

      - name: NPM Audit
        run: |
          npm audit --audit-level=high
          cd react-frontend && npm audit --audit-level=high
          cd ../e2e && npm audit --audit-level=high

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'nexus'
          path: '.'
          format: 'HTML'
          args: >-
            --enableRetired
            --enableExperimental
            --failOnCVSS 7
            --suppression owasp-suppressions.xml
            --disableOssIndex

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: reports/
        if: always()

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t nexus-app:scan -f Dockerfile .

      # ── Trivy container scan ─────────────────────────────────────
      # Scans the built Docker image for OS and library vulnerabilities.
      # --ignore-unfixed skips CVEs with no available patch (mostly
      # linux-libc-dev kernel CVEs not exploitable in containers).
      # .trivyignore suppresses known kernel CVEs irrelevant in containers.
      #
      # The TABLE step is the blocking gate (exit-code 1) because Trivy
      # correctly handles .trivyignore suppressions in table format.
      # The SARIF step is non-blocking (exit-code 0) and uploads results
      # to the GitHub Security tab for visibility.
      - name: Run Trivy Container Scan (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexus-app:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '1'

      - name: Run Trivy Container Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexus-app:scan'
          format: 'sarif'
          output: 'container-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '0'

      - name: Upload Container Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'container-trivy-results.sarif'
        if: always()

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: PHP Checks (syntax + unit tests + service tests)
  # ─────────────────────────────────────────────────────────────────
  php-checks:
    name: PHP Checks
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testing
          MYSQL_DATABASE: nexus_test
          MYSQL_USER: nexus
          MYSQL_PASSWORD: nexus_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, mbstring, xml, zip, redis, gd, intl, bcmath, opcache, curl, fileinfo
          coverage: xdebug

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup Test Database Schema
        run: |
          echo "Loading schema into nexus_test database..."
          mysql -h 127.0.0.1 -u root -ptesting nexus_test < schema.sql
          echo "Creating nexus database for DatabaseTestCase fallback..."
          mysql -h 127.0.0.1 -u root -ptesting -e "CREATE DATABASE IF NOT EXISTS nexus;"
          mysql -h 127.0.0.1 -u root -ptesting -e "GRANT ALL PRIVILEGES ON nexus.* TO 'nexus'@'%';"
          mysql -h 127.0.0.1 -u root -ptesting -e "FLUSH PRIVILEGES;"
          mysql -h 127.0.0.1 -u root -ptesting nexus < schema.sql
          echo "Seeding test tenants and categories..."
          mysql -h 127.0.0.1 -u root -ptesting nexus_test -e "INSERT INTO tenants (id, name, slug, is_active) VALUES (1, 'Test Tenant', 'test-tenant', 1), (2, 'Test Tenant 2', 'test-tenant-2', 1);"
          mysql -h 127.0.0.1 -u root -ptesting nexus_test -e "INSERT IGNORE INTO categories (id, name, slug, tenant_id, type) VALUES (1, 'General', 'general', 1, 'listing');"
          mysql -h 127.0.0.1 -u root -ptesting nexus -e "INSERT INTO tenants (id, name, slug, is_active) VALUES (1, 'Test Tenant', 'test-tenant', 1), (2, 'Test Tenant 2', 'test-tenant-2', 1);"
          mysql -h 127.0.0.1 -u root -ptesting nexus -e "INSERT IGNORE INTO categories (id, name, slug, tenant_id, type) VALUES (1, 'General', 'general', 1, 'listing');"
          echo "Test database schema and seed data loaded successfully."

      - name: PHP Syntax Check
        run: |
          echo "Checking PHP syntax in src/ ..."
          ERRORS=$(find src -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -c "Parse error" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS PHP syntax error(s):"
            find src -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep "Parse error"
            exit 1
          fi
          echo "All PHP files passed syntax check."

      - name: PHPUnit Unit Tests (BLOCKING)
        run: vendor/bin/phpunit --testsuite=Unit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: nexus_test
          DB_USER: nexus
          DB_PASS: nexus_test
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing

      - name: PHPUnit Service Tests (BLOCKING)
        run: vendor/bin/phpunit --testsuite=Services --display-warnings
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: nexus_test
          DB_USER: nexus
          DB_PASS: nexus_test
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing
          TOTP_ENCRYPTION_KEY: test-ci-totp-encryption-key-32chars!

      - name: PHPUnit Middleware Tests (BLOCKING)
        run: vendor/bin/phpunit --testsuite=Middleware
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: nexus_test
          DB_USER: nexus
          DB_PASS: nexus_test
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing

      - name: PHPUnit Model Tests (BLOCKING)
        run: vendor/bin/phpunit --testsuite=Models --display-warnings
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: nexus_test
          DB_USER: nexus
          DB_PASS: nexus_test
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing

      - name: PHPUnit Coverage Report (informational)
        run: |
          vendor/bin/phpunit --testsuite=Unit --coverage-text --coverage-clover=coverage/clover.xml 2>&1 | tail -30 || true
          echo "Coverage report generated. Review for threshold tracking."
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: nexus_test
          DB_USER: nexus
          DB_PASS: nexus_test
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing

      - name: "BLOCKING: PHPStan static analysis (level 3)"
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M --error-format=github

      # TD15: Validate that all required env vars referenced in config/ are
      # documented in .env.example. Catches the class of bug where a new
      # config/foo.php references env('NEW_KEY') but the example wasn't updated,
      # which would crash-loop `php artisan config:cache` at container start.
      #
      # WARNING-ONLY: Laravel's framework config files (session.php, broadcasting.php,
      # queue.php, filesystems.php, mail.php) use env() without fallback as a
      # documented pattern — these keys are only read when the driver is selected.
      # Promoting to BLOCKING would require an allowlist or a smarter scanner.
      # Tracked as a follow-up; for now this surfaces new gaps without blocking CI.
      - name: "WARNING: Validate required env vars are documented"
        run: |
          cp .env.example .env.ci
          php scripts/validate-env.php --file=.env.ci || \
              echo "::warning::New env() calls in config/ may not be documented in .env.example — review output above"
        continue-on-error: true

      # TD15: Exercise artisan cache commands — these are fail-fast at container
      # start in Dockerfile.prod. Any failure here would crash-loop production.
      # We copy .env.example → .env and generate an APP_KEY so cache:build has
      # a valid encryption key; without this, config:cache fails immediately on
      # a fresh checkout.
      - name: "BLOCKING: Artisan cache fail-fast test"
        run: |
          # Seed .env from example so env() calls resolve
          [ -f .env ] || cp .env.example .env
          # Ensure bootstrap/cache exists (gitignored — absent in fresh CI clone)
          mkdir -p bootstrap/cache
          # Ensure APP_KEY is set (required by config:cache)
          php artisan key:generate --force --ansi
          php artisan config:cache
          php artisan route:cache
          php artisan event:cache
          # Clean up so subsequent steps don't inherit cached config
          php artisan config:clear
          php artisan route:clear
          php artisan event:clear
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: nexus_test
          DB_USER: nexus
          DB_PASS: nexus_test
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: React Frontend (TypeScript + Vitest + Build)
  # ─────────────────────────────────────────────────────────────────
  react-build:
    name: React Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: react-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: react-frontend
        run: npm ci

      - name: TypeScript Check (BLOCKING)
        working-directory: react-frontend
        run: npx tsc --noEmit

      - name: Vitest Unit Tests (BLOCKING)
        working-directory: react-frontend
        shell: bash
        run: |
          # Workaround: Vitest v3.2 hangs after all tests pass because jsdom +
          # @react-aria/overlays + framer-motion leave open handles that prevent
          # fork workers from exiting. Background the process and force-kill if
          # it hasn't exited within 2 minutes (tests take ~60s).
          npm test -- --run &
          PID=$!

          # Poll for exit (120s timeout, 5s intervals)
          for i in $(seq 1 24); do
            sleep 5
            if ! kill -0 $PID 2>/dev/null; then break; fi
          done

          # If still running → all tests passed but process hung during cleanup
          if kill -0 $PID 2>/dev/null; then
            echo ""
            echo "::notice::Vitest completed all tests but hung during teardown — force-killing"
            kill -9 $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            exit 0
          fi

          # Vitest exited on its own — use its exit code
          wait $PID
        timeout-minutes: 4

      - name: Vitest Coverage Check (BLOCKING)
        working-directory: react-frontend
        shell: bash
        run: |
          # Same Vitest hang workaround as above — use timeout for coverage run.
          # Thresholds are enforced by vitest.config.ts (statements:55, branches:50,
          # functions:50, lines:55). A non-zero exit from vitest fails the step.
          set -o pipefail
          timeout 120 npx vitest run --coverage 2>&1 | tee /tmp/vitest-coverage.txt
          EXIT_CODE=${PIPESTATUS[0]}
          tail -50 /tmp/vitest-coverage.txt
          exit $EXIT_CODE
        timeout-minutes: 4

      - name: Post Coverage Report as PR Comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vitest-coverage
          message: |
            ## Vitest Coverage Report

            Coverage thresholds (enforced): statements 55%, branches 50%, functions 50%, lines 55%

            <details>
            <summary>View full coverage output</summary>

            _Coverage data is generated during the "Vitest Coverage Check" step above._
            _Review the step output for detailed line-by-line coverage._

            </details>

            > Generated by CI pipeline — [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Build Production Bundle (BLOCKING)
        working-directory: react-frontend
        run: npm run build
        env:
          VITE_API_BASE: /api

      - name: Upload React Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-frontend-build
          path: react-frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # Stage 2b: API Contract Validation
  # Runs Zod schema contract tests to detect frontend/backend schema drift.
  # Failure = PHP controller changed response shape without updating TypeScript.
  # ─────────────────────────────────────────────────────────────────
  api-contract:
    name: "BLOCKING: API Contract Validation"
    runs-on: ubuntu-latest
    needs: [react-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: react-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: react-frontend
        run: npm ci

      - name: "BLOCKING: Run API contract schema tests"
        working-directory: react-frontend
        shell: bash
        run: |
          # Runs Zod schema contract tests only (fast, ~5s).
          # Tests use hardcoded representative payloads mirroring PHP backend
          # response shapes. Failure means PHP/TypeScript schema drift detected.
          npx vitest run src/lib/api-schemas.test.ts --reporter=verbose
        timeout-minutes: 3

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Docker Build Verification
  # ─────────────────────────────────────────────────────────────────
  docker-verify:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: [php-checks, react-build, api-contract]

    steps:
      - uses: actions/checkout@v4

      - name: Build PHP Container
        run: docker build --no-cache -f Dockerfile -t nexus-php-test:ci .

      - name: Build Production PHP Container
        run: docker build --no-cache -f Dockerfile.prod -t nexus-php-prod-test:ci .

      - name: Build React Frontend Container
        working-directory: react-frontend
        run: |
          if [ -f Dockerfile.prod ]; then
            docker build --no-cache -f Dockerfile.prod --build-arg VITE_API_BASE=/api -t nexus-react-test:ci .
          elif [ -f Dockerfile ]; then
            docker build --no-cache -f Dockerfile -t nexus-react-test:ci .
          fi

      - name: Build Sales Site Container
        run: docker build --no-cache -f sales-site/Dockerfile -t nexus-sales-test:ci sales-site/

      - name: Verify PHP Container Starts
        run: |
          docker run -d --name php-test nexus-php-prod-test:ci
          sleep 5
          docker exec php-test curl -sf http://localhost/health.php || echo "::warning::Health check failed"
          docker stop php-test

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Dockerfile Drift Detection
  # ─────────────────────────────────────────────────────────────────
  dockerfile-drift:
    name: Dockerfile Drift Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compare PHP settings between Dockerfile and Dockerfile.prod
        run: |
          echo "========================================="
          echo "Dockerfile Drift Detection"
          echo "========================================="
          echo ""

          SETTINGS="upload_max_filesize post_max_size max_execution_time max_input_time max_input_vars memory_limit"
          DRIFT_FOUND=0

          for SETTING in $SETTINGS; do
            # Extract value from Dockerfile (dev)
            DEV_VALUE=$(grep -oP "${SETTING}\s*=\s*\K[^\s\\\\]+" Dockerfile || echo "NOT_SET")
            # Extract value from Dockerfile.prod
            PROD_VALUE=$(grep -oP "${SETTING}\s*=\s*\K[^\s\\\\]+" Dockerfile.prod || echo "NOT_SET")

            if [ "$DEV_VALUE" != "$PROD_VALUE" ]; then
              echo "::error::DRIFT DETECTED: ${SETTING} differs between Dockerfile (${DEV_VALUE}) and Dockerfile.prod (${PROD_VALUE})"
              DRIFT_FOUND=1
            else
              echo "OK: ${SETTING} = ${DEV_VALUE} (both files match)"
            fi
          done

          echo ""
          if [ "$DRIFT_FOUND" -eq 1 ]; then
            echo "========================================="
            echo "FAILURE: Dockerfile settings have drifted!"
            echo "Update both Dockerfile and Dockerfile.prod to keep PHP settings in sync."
            echo "========================================="
            exit 1
          else
            echo "========================================="
            echo "SUCCESS: All tracked PHP settings match."
            echo "========================================="
          fi

  # ─────────────────────────────────────────────────────────────────
  # Stage 5: Migration Safety Gate
  # ─────────────────────────────────────────────────────────────────
  migration-gate:
    name: Migration Safety Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "BLOCKING: Check schema changes have migrations"
        run: bash scripts/check-migration-ci.sh origin/${{ github.base_ref || 'main' }}

      - name: "BLOCKING: Block new legacy SQL migrations (use Laravel instead)"
        run: bash scripts/check-no-new-legacy-sql.sh origin/${{ github.base_ref || 'main' }}

      - name: "WARNING: Schema dump drift detection"
        run: bash scripts/check-schema-drift.sh || true

  # ─────────────────────────────────────────────────────────────────
  # Stage 6: Translation Drift Detection
  # ─────────────────────────────────────────────────────────────────
  i18n-drift:
    name: Translation Drift Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "BLOCKING: Check for translation key mismatches"
        run: node scripts/check-i18n-drift.mjs

      - name: "BLOCKING: Check for hardcoded strings in email templates"
        run: bash scripts/check-i18n.sh

      # check-admin-i18n REMOVED 2026-04-22 — admin panel is English-only by design.
      # Hardcoded English in admin code is intentional, not a violation.
      # See memory/feedback_admin_english_only.md.

      - name: "BLOCKING: Prevent non-admin translation-gap regressions"
        run: npm run check:i18n:baseline

      - name: "BLOCKING: Prevent stub placeholder translation values"
        run: node scripts/check-i18n-stubs.mjs

      # check-admin-breadcrumbs REMOVED 2026-04-22 — admin is English-only by design.
      # See memory/feedback_admin_english_only.md.

      - name: "BLOCKING: Exhaustive t() key coverage (ratchets down via baseline)"
        run: node scripts/check-i18n-coverage.mjs

      - name: "BLOCKING: Variable-name mismatches between t() args and {{placeholders}}"
        run: node scripts/check-i18n-vars.mjs

      - name: "BLOCKING: PHP __() key coverage (emails, notifications, services)"
        run: node scripts/check-php-i18n-coverage.mjs

      - name: "INFO: Audit non-admin English fallback gaps"
        run: npm run check:i18n:gaps


  # ─────────────────────────────────────────────────────────────────
  # Stage 6b: SPDX/AGPL License Compliance Check
  # ─────────────────────────────────────────────────────────────────
  spdx-compliance:
    name: SPDX License Compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "BLOCKING: Check SPDX headers on all source files"
        run: node scripts/check-spdx.mjs

  # ─────────────────────────────────────────────────────────────────
  # Stage 7: Regression Pattern Detection
  # ─────────────────────────────────────────────────────────────────
  regression-patterns:
    name: Regression Pattern Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "BLOCKING: Check for incorrect API response unwrapping (data.data ??)"
        run: |
          echo "Checking for 'data.data ??' pattern in React source..."
          echo "(This pattern causes ErrorBoundary crashes — must use 'data' in data ? data.data : data)"
          echo ""

          MATCHES=$(grep -rn "data\.data ??" react-frontend/src/ || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::REGRESSION DETECTED: Found 'data.data ??' pattern (incorrect API response unwrapping)."
            echo ""
            echo "Offending files:"
            echo "$MATCHES"
            echo ""
            echo "Fix: Use \"'data' in data ? data.data : data\" instead of \"data.data ?? data\""
            exit 1
          fi

          echo "PASS: No incorrect 'data.data ??' patterns found."

      - name: "WARNING: Count 'as any' type assertions"
        run: |
          echo "Counting 'as any' type assertions in React source..."
          echo ""

          COUNT=$(grep -rn "as any" react-frontend/src/ | wc -l || echo "0")
          COUNT=$(echo "$COUNT" | tr -d ' ')

          echo "Found ${COUNT} 'as any' assertion(s)."

          if [ "$COUNT" -gt 20 ]; then
            echo "::warning::TypeScript safety: Found ${COUNT} 'as any' assertions (threshold: 20). Consider reducing type assertion usage."
          else
            echo "PASS: 'as any' count (${COUNT}) is within acceptable threshold (<=20)."
          fi

      - name: "WARNING: Check for DELETE without tenant_id scoping"
        run: |
          echo "Checking for DELETE FROM statements without tenant_id in PHP source..."
          echo ""

          # Find DELETE FROM statements, then check if they lack tenant_id
          # We look for DELETE FROM in PHP files, excluding migrations and test files
          UNSCOPED=$(grep -rn "DELETE FROM" src/ \
            --include="*.php" \
            | grep -iv "tenant_id" \
            | grep -iv "migration" \
            | grep -iv "// " \
            | grep -iv "sessions" \
            | grep -iv "password_resets" \
            | grep -iv "cache" \
            | grep -iv "jobs" \
            | grep -iv "failed_jobs" \
            || true)

          if [ -n "$UNSCOPED" ]; then
            echo "::warning::Potential unscoped DELETE statements found (missing tenant_id). Review these carefully:"
            echo ""
            echo "$UNSCOPED"
            echo ""
            echo "If these tables are intentionally not tenant-scoped (e.g., sessions, cache), this warning can be ignored."
          else
            echo "PASS: All DELETE FROM statements appear to include tenant_id scoping."
          fi

  # ─────────────────────────────────────────────────────────────────
  # Stage 7: E2E Smoke Tests (Playwright)
  # ─────────────────────────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [react-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install E2E Dependencies
        # e2e/package.json has its own deps (@axe-core/playwright etc.)
        # that are NOT in the root package.json — must install separately.
        run: cd e2e && npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env.ci
        run: |
          cat > .env.ci <<'EOF'
          APP_ENV=testing
          APP_DEBUG=true
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_URL=http://localhost
          DB_HOST=nexus-ci-db
          DB_PORT=3306
          DB_DATABASE=nexus_test
          DB_NAME=nexus_test
          DB_USER=nexus_ci
          DB_PASS=nexus_ci_pass
          REDIS_HOST=nexus-ci-redis
          REDIS_PORT=6379
          QUEUE_CONNECTION=sync
          CACHE_DRIVER=redis
          SESSION_DRIVER=redis
          MEILISEARCH_HOST=
          MEILISEARCH_KEY=
          PUSHER_APP_ID=
          PUSHER_KEY=
          PUSHER_SECRET=
          OPENAI_API_KEY=
          STRIPE_SECRET_KEY=
          SENDGRID_API_KEY=
          EOF

      - name: Start Application Stack
        run: |
          docker compose -f compose.ci.yml up -d --wait
          echo "CI stack is healthy — all services passed their healthchecks."

      - name: Run Playwright Smoke Tests
        run: npx playwright test --grep @smoke --project=chromium-modern
        env:
          E2E_BASE_URL: http://localhost:5173
          CI: true

      - name: Upload Smoke Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-smoke-report
          path: |
            e2e/reports/
            e2e/test-results/
          retention-days: 14

      - name: Stop Application Stack
        if: always()
        run: docker compose -f compose.ci.yml down -v

  # ─────────────────────────────────────────────────────────────────
  # Stage 8: Accessibility Checks (blocking)
  # ─────────────────────────────────────────────────────────────────
  accessibility-check:
    name: Accessibility Audit (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: [react-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download React build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-frontend-build
          path: react-frontend/dist

      - name: Install axe-core CLI and serve
        run: npm install -g @axe-core/cli serve

      - name: Serve built frontend and run WCAG scan
        run: |
          # Serve the built React app locally (not production!)
          npx serve -s react-frontend/dist -l 3000 &
          SERVE_PID=$!
          sleep 3

          echo "Running axe accessibility scan on local build..."

          PAGES=(
            "http://localhost:3000/hour-timebank"
            "http://localhost:3000/hour-timebank/login"
            "http://localhost:3000/hour-timebank/about"
            "http://localhost:3000/hour-timebank/help"
          )

          VIOLATIONS=0
          for PAGE in "${PAGES[@]}"; do
            echo "Scanning: $PAGE"
            axe "$PAGE" --tags wcag2a,wcag2aa --reporter json > /tmp/axe-result.json 2>&1 || true

            VIOLS=$(cat /tmp/axe-result.json | python3 -c "
          import json,sys
          try:
            data = json.load(sys.stdin)
            v = sum(len(r.get('violations',[])) for r in data if isinstance(r,dict))
            print(v)
          except: print(0)
          " 2>/dev/null || echo "0")

            echo "  Violations: $VIOLS"
            VIOLATIONS=$((VIOLATIONS + VIOLS))
          done

          echo ""
          echo "Total violations across all pages: $VIOLATIONS"

          # Clean up local server
          kill "$SERVE_PID" 2>/dev/null || true

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::Accessibility: Found $VIOLATIONS WCAG 2.1 AA violations. Fix before merging."
            exit 1
          else
            echo "PASS: No WCAG 2.1 AA violations detected."
            exit 0
          fi

# =============================================================================
# Project NEXUS PHP Stack - Production Docker Compose
# =============================================================================
# Deploy to: /opt/nexus-php/compose.yml on production server
#
# Domains:
#   - api.project-nexus.ie  -> PHP API (port 8090)
#   - app.project-nexus.ie  -> React Frontend (port 3000)
#   - project-nexus.ie      -> Sales Site (port 3001)
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#
# Volume / container naming convention:
#   Production (this file):  `nexus-php-*` prefix (e.g. nexus-php-uploads)
#   Local dev (compose.yml): `nexus-*` prefix (e.g. nexus-mysql-data)
# DO NOT rename existing volumes — renaming detaches Docker from the on-disk
# data and causes silent data loss. The prefixes are intentionally distinct
# so that dev and prod stacks can coexist on the same host without collision.
# =============================================================================

name: nexus-php

services:
  # ---------------------------------------------------------------------------
  # PHP Application (Apache + PHP 8.2)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nexus-php-app
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "8090:80"
    volumes:
      # Read-only mounts for security
      - ./httpdocs:/var/www/html/httpdocs:ro
      - ./src:/var/www/html/src:ro
      - ./views:/var/www/html/views:ro
      - ./config:/var/www/html/config:ro
      - ./vendor:/var/www/html/vendor:ro
      # Laravel framework files (read-only)
      - ./artisan:/var/www/html/artisan:ro
      - ./bootstrap:/var/www/html/bootstrap:ro
      - ./routes:/var/www/html/routes:ro
      - ./app:/var/www/html/app:ro
      - ./composer.json:/var/www/html/composer.json:ro
      - ./database:/var/www/html/database:ro
      # Laravel translation files (used by __() in emails + API responses).
      # Without this mount, every __('emails_misc.…') call returns the raw key.
      - ./lang:/var/www/html/lang:ro
      # Writable uploads directory
      - nexus-php-uploads:/var/www/html/httpdocs/uploads
      # Writable logs
      - nexus-php-logs:/var/log
      # Laravel writable directories
      - nexus-php-storage:/var/www/html/storage
      - nexus-php-bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.project-nexus.ie
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - nexus-php-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # PHP memory_limit is 1G (per php.ini); 2G container limit gives
          # Apache mpm_prefork workers, OPcache (256M), and request peaks
          # generous headroom on the 16GB VM.
          memory: 2G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # React Frontend (Nginx serving static build)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: https://api.project-nexus.ie/api
        VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
        VITE_GOOGLE_MAPS_MAP_ID: ${GOOGLE_MAPS_MAP_ID:-}
        VITE_SENTRY_DSN: ${SENTRY_DSN_REACT:-}
        VITE_SENTRY_ENVIRONMENT: production
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_PUSHER_KEY: ${PUSHER_KEY:-}
        VITE_PUSHER_CLUSTER: ${PUSHER_CLUSTER:-eu}
        VITE_GIPHY_API_KEY: ${GIPHY_API_KEY:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
    image: nexus-react-prod:latest
    container_name: nexus-react-prod
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "3000:80"
    volumes:
      # Persist per-tenant pre-rendered HTML across frontend container rebuilds.
      # Deploys can then serve the previous good render immediately and refresh
      # only when public-facing output may have changed.
      - nexus-php-prerendered:/usr/share/nginx/html/prerendered
    networks:
      - nexus-php-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # MariaDB 10.11 Database
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: nexus-php-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=1G
      - --innodb-log-file-size=256M
      - --max-connections=150
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-nexus}
      MARIADB_USER: ${DB_USER:-nexus}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - nexus-php-db-data:/var/lib/mysql
    networks:
      - nexus-php-internal
    # Not exposed to host - internal only
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis 7 (Sessions & Cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nexus-php-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 400mb
      --maxmemory-policy volatile-lru
      --maxmemory-samples 10
      --save 900 1
      --save 300 10
    volumes:
      - nexus-php-redis-data:/data
    networks:
      - nexus-php-internal
    # Not exposed to host - internal only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Meilisearch v1 (Full-text + semantic search engine)
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: nexus-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - nexus-meili-data:/meili_data
    networks:
      - nexus-php-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Queue Worker (Laravel queue:work — processes async jobs via Redis)
  # Federation push listeners, notifications, etc. run here, not in HTTP requests.
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nexus-php-queue
    command: sh -c "php artisan optimize && php artisan horizon"
    restart: unless-stopped
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'artisan horizon' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - ./app:/var/www/html/app:ro
      - ./src:/var/www/html/src:ro
      - ./config:/var/www/html/config:ro
      - ./vendor:/var/www/html/vendor:ro
      - ./artisan:/var/www/html/artisan:ro
      - ./bootstrap:/var/www/html/bootstrap:ro
      - ./routes:/var/www/html/routes:ro
      - ./database:/var/www/html/database:ro
      - ./composer.json:/var/www/html/composer.json:ro
      # Laravel translation files — must be mounted here too so queued jobs
      # (safeguarding emails, notifications) resolve __() keys correctly.
      - ./lang:/var/www/html/lang:ro
      - nexus-php-storage:/var/www/html/storage
      - nexus-php-bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.project-nexus.ie
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-php-internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Scheduler (Laravel schedule:run — cron-style tasks every 60s)
  # Runs scheduled jobs: emails, Horizon metric snapshots, etc.
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nexus-php-scheduler
    command: sh -c "php artisan optimize && while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    restart: unless-stopped
    stop_grace_period: 90s
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'schedule:run' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./app:/var/www/html/app:ro
      - ./src:/var/www/html/src:ro
      - ./config:/var/www/html/config:ro
      - ./vendor:/var/www/html/vendor:ro
      - ./artisan:/var/www/html/artisan:ro
      - ./bootstrap:/var/www/html/bootstrap:ro
      - ./routes:/var/www/html/routes:ro
      - ./database:/var/www/html/database:ro
      - ./composer.json:/var/www/html/composer.json:ro
      - ./lang:/var/www/html/lang:ro
      - nexus-php-storage:/var/www/html/storage
      - nexus-php-bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.project-nexus.ie
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-php-internal
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Sales Site (project-nexus.ie) - Marketing/Landing Page
  # ---------------------------------------------------------------------------
  sales:
    build:
      context: ./sales-site
      dockerfile: Dockerfile
    container_name: nexus-sales-site
    restart: unless-stopped
    ports:
      - "3003:80"
    networks:
      - nexus-php-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# =============================================================================
# Networks
# =============================================================================
networks:
  nexus-php-internal:
    name: nexus-php-internal
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  nexus-php-db-data:
    name: nexus-php-db-data
  nexus-php-redis-data:
    name: nexus-php-redis-data
  nexus-meili-data:
    name: nexus-meili-data
  nexus-php-uploads:
    name: nexus-php-uploads
  nexus-php-logs:
    name: nexus-php-logs
  nexus-php-storage:
    name: nexus-php-storage
  nexus-php-bootstrap-cache:
    name: nexus-php-bootstrap-cache
  nexus-php-prerendered:
    name: nexus-php-prerendered

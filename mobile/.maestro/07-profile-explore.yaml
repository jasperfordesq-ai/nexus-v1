#
# Flow 07 - Profile: Discover and My Space
#
# Verifies the Profile screen discovery and personal sections. Checks the wallet
# shortcut, then navigates to AI Assistant from Discover and Achievements from
# the collapsible My space section.
#
# Run:
#   maestro test -e TEST_EMAIL=user@example.com -e TEST_PASSWORD=secret \
#     .maestro/07-profile-explore.yaml

appId: ie.project.nexus
---
# 1. Launch the app without clearing state
- launchApp

- extendedWaitUntil:
    visible: "Welcome back|Community Feed|Home|Listings|Messages|More|View wallet"
    timeout: 60000

# 2. Re-authenticate if session has expired
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - runFlow:
          when:
            visible: "Select your timebank"
          commands:
            - tapOn: "hour-timebank"
      - tapOn:
          id: "email-input"
      - inputText: "${TEST_EMAIL}"
      - tapOn:
          id: "password-input"
      - inputText: "${TEST_PASSWORD}"
      - back
      - tapOn:
          id: "login-submit"
      - extendedWaitUntil:
          visible: "Community Feed"
          timeout: 10000

# 3. Tap the More tab
- tapOn: "More"

# 4. Wait for the profile screen to load
- extendedWaitUntil:
    visible: "View wallet"
    timeout: 5000

# 5. Assert the profile header area is visible
- assertVisible: "View wallet"

# 6. Scroll down to a visible Discover item and open AI Assistant
- scrollUntilVisible:
    element:
      text: "AI Assistant"
    direction: DOWN
- tapOn: "AI Assistant"

# 7. Assert the AI chat screen loaded without crashing
- extendedWaitUntil:
    visible: "AI Assistant"
    timeout: 5000
- assertVisible: "Ask me anything..."
- takeScreenshot: ai-chat

# 8. Navigate back to the profile screen
- back
- extendedWaitUntil:
    visible: "View wallet|AI Assistant|My space"
    timeout: 5000

# 9. Open the My space accordion and navigate to Achievements
- scrollUntilVisible:
    element:
      text: "My space"
    direction: DOWN
- tapOn: "My space"
- scrollUntilVisible:
    element:
      text: "Achievements"
    direction: DOWN
- tapOn: "Achievements"

# 10. Assert the achievements screen loaded without crashing
- extendedWaitUntil:
    visible: "Achievements"
    timeout: 5000
- assertVisible: "Achievements"
- takeScreenshot: achievements

# 11. Navigate back to profile
- back

# Maestro configuration for Project NEXUS mobile (bundle ID: ie.hour.nexus)
#
# ── Running flows ────────────────────────────────────────────────────────────
#   Run all flows in order:
#     maestro test .maestro/
#
#   Run a single flow:
#     maestro test .maestro/01-auth-login.yaml
#
#   Run with credentials injected via env vars:
#     maestro test \
#       --env TEST_EMAIL=user@example.com \
#       --env TEST_PASSWORD=secret \
#       .maestro/
#
# ── Required env vars ────────────────────────────────────────────────────────
#   TEST_EMAIL     — email address for an existing test account
#   TEST_PASSWORD  — password for that account
#
# ── Flow ordering ────────────────────────────────────────────────────────────
#   01  auth-login          Must run first (establishes session used by later flows)
#   02  auth-logout         Requires login state from 01; logs out and verifies
#   03  browse-listings     Independent; logs in internally
#   04  browse-groups       Independent; logs in internally
#   05  view-events         Independent; logs in internally
#   06  messages-flow       Independent; logs in internally
#   07  profile-explore     Independent; logs in internally
#   08  search-flow         Independent; logs in internally
#   09  registration-flow   Independent; fresh install, does NOT submit the form
#
# ── Tenant selection screen ──────────────────────────────────────────────────
#   On a completely clean install (clearState: true) the app may show a
#   "Select your timebank" screen before the login form. Flows that use
#   clearState handle this with a conditional assertVisible / tapOn block.
#   The default tenant for the test environment is "hour-timebank".
#
# ── CI integration ───────────────────────────────────────────────────────────
#   See .github/workflows/mobile-eas-build.yml for EAS build configuration.
#   Maestro flows can be wired into a separate CI step after a preview build
#   is distributed to a device farm (e.g., BrowserStack App Automate):
#     maestro cloud --apiKey $MAESTRO_API_KEY .maestro/

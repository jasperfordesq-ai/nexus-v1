#
# Flow 06 — Messages
#
# Verifies that the Messages tab loads without crashing. The screen either
# shows a list of conversations or the empty state ("No conversations yet").
# Both states are asserted to handle fresh test accounts with no prior messages.
#
# Run:
#   maestro test --env TEST_EMAIL=user@example.com --env TEST_PASSWORD=secret \
#     .maestro/06-messages-flow.yaml

appId: ie.project.nexus
---
# ── 1. Launch the app without clearing state
- launchApp

- extendedWaitUntil:
    visible: "Welcome back|Community Feed|Home|Listings|Messages|More|View wallet"
    timeout: 60000

# ── 2. Re-authenticate if session has expired
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - runFlow:
          when:
            visible: "Select your timebank"
          commands:
            - tapOn: "hour-timebank"
      - tapOn:
          id: "email-input"
      - inputText: "${TEST_EMAIL}"
      - tapOn:
          id: "password-input"
      - inputText: "${TEST_PASSWORD}"
      - back
      - tapOn:
          id: "login-submit"
      - extendedWaitUntil:
          visible: "Community Feed"
          timeout: 10000

# ── 3. Tap the Messages tab in the bottom tab bar
- tapOn: "Messages"

# ── 4. Wait for the Messages screen to finish loading
- extendedWaitUntil:
    visible: "Messages"
    timeout: 5000

# ── 5. Assert the screen title is visible
- assertVisible: "Messages"

# ── 6. Screenshot the messages list (may be empty or populated)
- takeScreenshot: messages-list

# ── 7. Scroll down to verify no crash on an empty or populated conversation list
- swipe:
    direction: UP
    duration: 400

# ── 8. Wait briefly and scroll back up
- waitForAnimationToEnd:
    timeout: 400
- swipe:
    direction: DOWN
    duration: 400

# ── 9. Assert the screen is still intact (no crash)
- assertVisible: "Messages"

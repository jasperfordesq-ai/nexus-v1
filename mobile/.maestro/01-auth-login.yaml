#
# Flow 01 — Authentication: Login
#
# Verifies that a returning user can sign in with valid credentials and land
# on the main Feed tab. This is the foundation flow — most other flows depend
# on the session state it establishes when running the full suite.
#
# Run:
#   maestro test --env TEST_EMAIL=user@example.com --env TEST_PASSWORD=secret \
#     .maestro/01-auth-login.yaml

appId: ie.hour.nexus
---
# ── 1. Launch the app fresh (clears all stored state including any prior session)
- launchApp:
    clearState: true

# ── 2. Tenant selection gate ──────────────────────────────────────────────────
# On a clean install the app shows "Select your timebank" before the login
# screen. If the screen appears, tap the first (and typically only) community
# listed. The tapOn is a no-op if the element is not present.
- runFlow:
    when:
      visible: "Select your timebank"
    commands:
      # Wait for the community list to populate
      - wait:
          for:
            element:
              text: "Select your timebank"
            timeout: 5000
      # Tap the test tenant entry — falls back gracefully if already dismissed
      - tapOn: "hour-timebank"

# ── 3. Verify the login screen has loaded
- assertVisible: "Sign in"

# ── 4. Enter email address
- tapOn:
    id: "email-input"
- inputText: "${TEST_EMAIL}"

# ── 5. Enter password
- tapOn:
    id: "password-input"
- inputText: "${TEST_PASSWORD}"

# ── 6. Tap the Sign in button
- tapOn: "Sign in"

# ── 7. Wait for the home/feed screen to appear (tab bar loaded = login succeeded)
- wait:
    for:
      element:
        text: "Feed"
      timeout: 10000

# ── 8. Assert we are on the main screen
- assertVisible: "Feed"

# ── 9. Capture a screenshot for the CI artefact store
- takeScreenshot: login-success

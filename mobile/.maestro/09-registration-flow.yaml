#
# Flow 09 — Registration Form
#
# Verifies that the registration form renders correctly and that all required
# fields accept input. This flow does NOT submit the form to avoid creating
# throwaway accounts in the test tenant on every CI run. It exists purely to
# validate that the Create Account screen is reachable and functional.
#
# Text values are taken directly from locales/en/auth.json:
#   title:                "Create account"
#   firstNamePlaceholder: "Jane"
#   lastNamePlaceholder:  "Smith"
#   emailPlaceholder:     "you@example.com"
#   passwordPlaceholder:  "Min. 8 characters"
#
# Run:
#   maestro test .maestro/09-registration-flow.yaml
#   (No TEST_EMAIL / TEST_PASSWORD required — does not log in)

appId: ie.hour.nexus
---
# ── 1. Launch fresh — clearState ensures no residual session
- launchApp:
    clearState: true

# ── 2. Handle tenant selection if shown on a clean install
- runFlow:
    when:
      visible: "Select your timebank"
    commands:
      - wait:
          for:
            element:
              text: "Select your timebank"
            timeout: 5000
      - tapOn: "hour-timebank"

# ── 3. Assert we are on the login screen
- wait:
    for:
      element:
        text: "Sign in"
      timeout: 8000
- assertVisible: "Sign in"

# ── 4. Tap "Create account" link to navigate to the registration screen
- tapOn: "Create account"

# ── 5. Wait for the registration screen to load
- wait:
    for:
      element:
        text: "Create account"
      timeout: 5000

# ── 6. Assert the registration form title is visible
- assertVisible: "Create account"

# ── 7. Fill in the First name field
- tapOn:
    id: "register-first-name"
- inputText: "Test"

# ── 8. Fill in the Last name field
- tapOn:
    id: "register-last-name"
- inputText: "User"

# ── 9. Fill in the Email field
- tapOn:
    id: "register-email"
- inputText: "testuser.ci@example.com"

# ── 10. Fill in the Password field
- tapOn:
    id: "register-password"
- inputText: "TestPassword1"

# ── 11. Fill in the Confirm password field
- tapOn:
    id: "register-confirm-password"
- inputText: "TestPassword1"

# ── 12. Screenshot the completed registration form (before submit)
- takeScreenshot: registration-form

# ── 13. Assert all visible form labels are present (smoke test for i18n rendering)
- assertVisible: "First name"
- assertVisible: "Last name"
- assertVisible: "Email"
- assertVisible: "Password"

# ── NOTE: The submit button ("Create account") is intentionally NOT tapped here.
#    To test the full registration flow end-to-end, uncomment the lines below
#    and provide a unique email address (e.g., via a timestamp-based fixture).
#
#    - tapOn: "Create account"
#    - wait:
#        for:
#          element:
#            text: "Feed"
#          timeout: 15000
#    - assertVisible: "Feed"

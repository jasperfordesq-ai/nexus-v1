#
# Flow 05 — View Events
#
# Verifies the Events tab loads, the "Upcoming" section header is visible,
# and the list can be scrolled without crashing. The tab bar in the mobile
# app uses the "Members" label (not "Events") — events are accessed via the
# home locale tab key or via the feed. The tab bar labels are:
#   Feed | Listings | Messages | Members | Profile
#
# Events are surfaced on the Feed (home) screen under the "Upcoming" header.
# This flow navigates to the Feed tab and asserts event content.
#
# Run:
#   maestro test --env TEST_EMAIL=user@example.com --env TEST_PASSWORD=secret \
#     .maestro/05-view-events.yaml

appId: ie.hour.nexus
---
# ── 1. Launch the app without clearing state
- launchApp

# ── 2. Re-authenticate if session has expired
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - runFlow:
          when:
            visible: "Select your timebank"
          commands:
            - tapOn: "hour-timebank"
      - tapOn:
          id: "email-input"
      - inputText: "${TEST_EMAIL}"
      - tapOn:
          id: "password-input"
      - inputText: "${TEST_PASSWORD}"
      - tapOn: "Sign in"
      - wait:
          for:
            element:
              text: "Feed"
            timeout: 10000

# ── 3. Tap the Feed tab (first tab in the bottom bar) to ensure we start there
- tapOn: "Feed"

# ── 4. Wait for the feed to load
- wait:
    for:
      element:
        text: "Feed"
      timeout: 5000

# ── 5. Assert either "Upcoming" (events section) or the general Feed title is shown
- assertVisible: "Feed"

# ── 6. Scroll down to surface event cards in the feed
- swipe:
    direction: UP
    duration: 700

# ── 7. Wait a moment for lazy-loaded event cards to appear
- wait:
    for:
      milliseconds: 800

# ── 8. Screenshot the events section as it appears in the feed
- takeScreenshot: events-list

# ── 9. Continue scrolling to verify no crash deeper in the list
- swipe:
    direction: UP
    duration: 700

# ── 10. Scroll back to top to leave the app in a clean state
- swipe:
    direction: DOWN
    duration: 700

# ── 11. Assert the screen is still functional after scroll stress
- assertVisible: "Feed"

#
# Flow 02 - Authentication: Logout
#
# Verifies that a logged-in user can navigate to the More tab, find the
# stable sign-out control, confirm the dialog, and land back on login.
#
# Run:
#   maestro test -e TEST_EMAIL=user@example.com -e TEST_PASSWORD=secret \
#     .maestro/02-auth-logout.yaml

appId: ie.project.nexus
---
# 1. Launch the app without clearing state
- launchApp

# 2. Wait for the main screen to be ready
- extendedWaitUntil:
    visible: "Welcome back|Community Feed|Home|Listings|Messages|More|View wallet"
    timeout: 60000

# 3. Tap the More tab in the bottom tab bar
- tapOn: "More"

# 4. Wait for the profile screen to load
- extendedWaitUntil:
    visible: "View wallet"
    timeout: 5000

# 5. Scroll toward the bottom; extra swipes safely settle at the end of the
# profile list and avoid flaky scrollUntilVisible matching near the tab bar.
- swipe:
    direction: UP
    duration: 450
- swipe:
    direction: UP
    duration: 450
- swipe:
    direction: UP
    duration: 450
- swipe:
    direction: UP
    duration: 450
- swipe:
    direction: UP
    duration: 450
- swipe:
    direction: UP
    duration: 450
- waitForAnimationToEnd:
    timeout: 500

# 6. Tap Sign out
- tapOn:
    id: "profile-sign-out"

# 7. Confirm the sign-out dialog
- extendedWaitUntil:
    visible: "Are you sure you want to sign out?"
    timeout: 3000
- tapOn:
    id: "profile-confirm-sign-out"

# 8. Assert we are back on the login screen
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 8000
- assertVisible: "Welcome back"

# 9. Screenshot to confirm the final state
- takeScreenshot: logout-success

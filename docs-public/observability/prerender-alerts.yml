# =============================================================================
# Project NEXUS — Prometheus alerting rules for the prerender engine
# =============================================================================
# Drop this into your Prometheus alerting rules directory and reload Prometheus.
# Each alert mirrors a check the engine's own /health endpoint reports.
#
# Scrape target (per Prometheus job):
#   - job_name: nexus-prerender
#     scrape_interval: 30s
#     metrics_path: /api/v2/admin/prerender/metrics
#     bearer_token: <admin token issued for this scraper>
#     static_configs:
#       - targets: ['app.project-nexus.ie']
# =============================================================================

groups:
- name: nexus_prerender
  interval: 30s
  rules:

  # ───── RED: engine is broken ──────────────────────────────────────────────

  - alert: PrerenderHealthRed
    expr: nexus_prerender_health_status == 2
    for: 2m
    labels:
      severity: critical
      service: prerender
    annotations:
      summary: "Prerender engine is in RED state"
      description: |
        The prerender engine's own health rollup is reporting RED for >2m.
        Hit /api/v2/admin/prerender/health for actionable details.
      runbook: "https://github.com/jasperfordesq-ai/nexus-v1/blob/main/docs-public/observability/prerender-runbook.md"

  - alert: PrerenderCircuitBreakerTripped
    expr: nexus_prerender_breaker_tripped == 1
    for: 1m
    labels:
      severity: critical
      service: prerender
    annotations:
      summary: "Prerender circuit breaker has tripped"
      description: |
        Worker hit the failure threshold (default 5 in 10m) and is paused.
        Inspect the most recent failed jobs, fix the root cause, then either
        wait for auto-resume or POST /api/v2/admin/prerender/reset-breaker.

  - alert: PrerenderCacheUnreachable
    expr: nexus_prerender_cache_readable == 0
    for: 1m
    labels:
      severity: critical
      service: prerender
    annotations:
      summary: "Prerender cache filesystem unreachable"
      description: |
        The PHP container can't read the snapshot directory. Likely causes:
        nexus-php-prerendered volume unmounted, container missing the bind,
        or the host filesystem is full. Bots are about to start hitting the
        SPA fallback.

  - alert: PrerenderQueueJammed
    expr: nexus_prerender_queue_oldest_age_seconds > 600
    for: 2m
    labels:
      severity: critical
      service: prerender
    annotations:
      summary: "Oldest queued prerender job is older than 10 minutes"
      description: |
        The host cron processor isn't draining the queue. Verify:
        sudo systemctl status cron && cat /etc/cron.d/nexus-prerender-processor
        Then check the latest worker log:
        sudo tail -n 200 /opt/nexus-php/logs/prerender-job-processor.log

  # ───── YELLOW: degraded, watch ────────────────────────────────────────────

  - alert: PrerenderHealthYellow
    expr: nexus_prerender_health_status == 1
    for: 10m
    labels:
      severity: warning
      service: prerender
    annotations:
      summary: "Prerender engine in YELLOW state for >10m"
      description: "Check /api/v2/admin/prerender/health for the specific check that's failing."

  - alert: PrerenderRecentFailures
    expr: nexus_prerender_failures_recent > 0
    for: 10m
    labels:
      severity: warning
      service: prerender
    annotations:
      summary: "Prerender failures inside backoff window"
      description: "{{ $value }} cache path(s) failed recently. Look at the Failures tab."

  - alert: PrerenderCoverageLow
    expr: nexus_prerender_coverage_ratio < 0.9
    for: 30m
    labels:
      severity: warning
      service: prerender
    annotations:
      summary: "Prerender coverage below 90% for >30m"
      description: |
        Many expected routes are missing snapshots. Either disable the engine
        for those routes (config/prerender.php), or run a force-refresh.

  - alert: PrerenderAssetInvalid
    expr: nexus_prerender_asset_invalid_total > 0
    for: 1h
    labels:
      severity: warning
      service: prerender
    annotations:
      summary: "Snapshots reference dead /assets/* hashes"
      description: |
        {{ $value }} snapshot(s) point at JS/CSS hashes that no longer exist.
        Run prerender:auto-recache to refresh them.

# =============================================================================
# Project NEXUS - Docker Compose (Source of Truth for Local Development)
# =============================================================================
# Port: 8090 (http://localhost:8090)
# This is an ISOLATED stack - does not share networks/volumes with other projects.
#
# IMPORTANT: Uses .env.docker for configuration (not .env which is for XAMPP)
#
# Volume / container naming convention:
#   Local dev (this file):   `nexus-*` prefix (e.g. nexus-mysql-data)
#   Production (compose.prod.yml): `nexus-php-*` prefix (e.g. nexus-php-uploads)
# DO NOT rename existing volumes — renaming detaches Docker from the on-disk
# data and causes silent data loss. The prefixes are intentionally distinct
# so that dev and prod stacks can coexist on the same host without collision.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PHP Application (Apache + mod_rewrite for .htaccess support)
  # ---------------------------------------------------------------------------
  app:
    profiles:
      - docker-php
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-php-app
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8090:80"
    volumes:
      # Mount entire app for development (excludes vendor via .dockerignore)
      - .:/var/www/html:cached
      # vendor on a named Docker volume (Linux filesystem) — avoids Windows NTFS
      # slowness when composer extracts packages. Run: docker compose exec app composer install
      - nexus-vendor:/var/www/html/vendor
      # Persist uploads between rebuilds
      - nexus-uploads:/var/www/html/uploads
      - nexus-httpdocs-uploads:/var/www/html/httpdocs/uploads
      # Laravel storage (writable by www-data)
      - nexus-storage:/var/www/html/storage
      - nexus-bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      # Database (uses Docker service name) - HARDCODED to prevent .env override
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=nexus
      - DB_USER=nexus
      - DB_PASS=nexus_secret
      # Redis (optional)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # App settings
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=http://localhost:8090
      # JWT Secret for token generation (REQUIRED for login)
      - JWT_SECRET=${JWT_SECRET:-nexus-dev-jwt-secret-change-in-production}
      - APP_KEY=${APP_KEY:-nexus-dev-app-key-change-in-production}
      # Pass through API keys from host .env.docker
      - PUSHER_APP_KEY=${PUSHER_APP_KEY:-}
      - PUSHER_APP_SECRET=${PUSHER_APP_SECRET:-}
      - PUSHER_APP_ID=${PUSHER_APP_ID:-}
      - PUSHER_APP_CLUSTER=${PUSHER_APP_CLUSTER:-eu}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Meilisearch (search engine)
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-}
      # GOOGLE_MAPS_API_KEY loaded via env_file: .env.docker (not here, to avoid empty override)
      # Sentry error tracking
      - SENTRY_DSN_PHP=${SENTRY_DSN_PHP:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Container memory limit — must be above PHP memory_limit (1G, set in Dockerfile)
    # to leave headroom for Apache workers, OPcache (256M), and OS overhead.
    mem_limit: 2g
    mem_reservation: 512m

  # ---------------------------------------------------------------------------
  # MariaDB 10.11 Database (MySQL-compatible, Internal only)
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: nexus-php-db
    restart: unless-stopped
    env_file:
      - .env.docker
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-nexus_root_secret}
      MARIADB_DATABASE: ${DB_NAME:-nexus}
      MARIADB_USER: ${DB_USER:-nexus}
      MARIADB_PASSWORD: ${DB_PASS:-nexus_secret}
    volumes:
      - nexus-mysql-data:/var/lib/mysql
      # Optional: mount init scripts
      # - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - nexus-internal
    ports:
      # Exposed for the native Windows PHP/Apache dev stack.
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 (Sessions & Cache - Internal only)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nexus-php-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - nexus-redis-data:/data
    networks:
      - nexus-internal
    ports:
      # Exposed for the native Windows PHP/Apache dev stack.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Meilisearch v1 (Full-text + semantic search engine)
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: nexus-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - nexus-meili-data:/meili_data
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # React Frontend (Vite Dev Server)
  # ---------------------------------------------------------------------------
  frontend:
    # Default local frontend is native Windows Vite on port 5173. Docker Vite on
    # a Windows bind mount is much slower, so keep this service opt-in only:
    #   docker compose --profile docker-frontend up -d frontend
    profiles:
      - docker-frontend
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    image: nexus-react-dev:latest
    container_name: nexus-react-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot reload (exclude node_modules)
      - ./react-frontend:/app:cached
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=1
      - VITE_API_URL=http://app:80
      - VITE_DEFAULT_TENANT_ID=2
      # Google Maps key is loaded from react-frontend/.env.local (gitignored)
      # For Docker, it's also available via the mounted source volume
      # Sentry error tracking (React frontend)
      - VITE_SENTRY_DSN=${SENTRY_DSN_REACT:-}
      - VITE_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - VITE_SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      - app
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # Queue Worker (Laravel queue:work — processes async jobs via Redis)
  # Federation push listeners, notifications, etc. run here, not in HTTP requests.
  # ---------------------------------------------------------------------------
  queue:
    profiles:
      - docker-queue
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-queue-worker
    command: php artisan queue:work --queue=federation-high,federation,default --sleep=3 --tries=3 --timeout=60
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/var/www/html:cached
      - nexus-vendor:/var/www/html/vendor
      - nexus-storage:/var/www/html/storage
    environment:
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=nexus
      - DB_USER=nexus
      - DB_PASS=nexus_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_ENV=${APP_ENV:-development}
      - APP_KEY=${APP_KEY:-nexus-dev-app-key-change-in-production}
      - JWT_SECRET=${JWT_SECRET:-nexus-dev-jwt-secret-change-in-production}
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # Sales Site (project-nexus.ie) - Marketing/Landing Page
  # ---------------------------------------------------------------------------
  sales:
    profiles:
      - docker-sales
    build:
      context: ./sales-site
      dockerfile: Dockerfile
    container_name: nexus-sales-site
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      # Mount public folder for development hot reload
      - ./sales-site/public:/usr/share/nginx/html:cached
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # phpMyAdmin (Development only)
  # ---------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nexus-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-nexus_root_secret}
      UPLOAD_LIMIT: 100M
    ports:
      - "8091:80"
    depends_on:
      - db
    networks:
      - nexus-internal
    profiles:
      - tools

# =============================================================================
# Volumes (Named, isolated to this project)
# =============================================================================
volumes:
  nexus-vendor:
    name: nexus-vendor
  nexus-mysql-data:
    name: nexus-mysql-data
  nexus-redis-data:
    name: nexus-redis-data
  nexus-meili-data:
    name: nexus-meili-data
  nexus-uploads:
    name: nexus-uploads
  nexus-httpdocs-uploads:
    name: nexus-httpdocs-uploads
  nexus-storage:
    name: nexus-storage
  nexus-bootstrap-cache:
    name: nexus-bootstrap-cache

# =============================================================================
# Networks (Isolated - does NOT connect to external projects)
# =============================================================================
networks:
  nexus-internal:
    name: nexus-internal
    driver: bridge
